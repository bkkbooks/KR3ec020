body:
  text: 第三卷石青苔石青苔生石上或土山上形似水青苔其性不同味辛甘採取曬乾為末能解毒藥性有中毒者服此即愈敷瘡功勝一筆勾範本卷六水青苔水青苔味甘平性熱無毒主治大小便虛冷水瀉陰寒亦解暖臍甚佳採取煅之為末可搽疔瘡黃水瘡痘症頂陷亦有效範本卷六石癬石癬又名白地膏生石上形如白森樣形薄味苦澀性寒治赤白帶下便濁五淋疼痛敷一切諸瘡無名腫毒最良上有黑點者必年深日久方能有之得此最效但不能多得叢本卷中白地膏生山地上形似蟲窩亦同白森或敷貼於石上色白性冷採取敷大惡瘡無名腫毒湯火傷調醋搽之如神效或為末調麻油搽痔瘡民族地區治小兒生火調麻油搽火即散又治臁瘡如神效務本卷一上地卷草地卷草生石上或貼地緑細葉自捲成蟲形一名蟲草一名抓地松民族地區呼為石上青苔俗呼地卷絲作菜食味甘寒無毒採取曬乾為末聽用治鼻血效治一切跌打損傷骨碎筋斷手足痿軟煮酒常服即愈不可生用生則破血務本卷一上靈芝草靈芝草此草生山中分五色俗呼菌子赤芝味甘無毒治胸中有積補中強智慧服之輕身白芝味辣無毒治一切肺痿癆咳力能延年黑芝味鹹性平無毒補腎通竅利水黑髮黃芝味甘辛性平無毒熬膏久服輕身延年青芝味鹹無毒治眼目不明務本卷一上帚菌帚菌俗名笤帚菌味甘性平無毒主治和胃氣祛風破血緩中多食令人氣凝少者舒氣範本卷十一黃菌黃菌味甘性溫平得天地土濕之氣而生雖能溫中健胃但濕氣居多食之往往令人氣脹欲食者須以姜同炙之方能解其濕氣世人多以大蒜同煮以為有毒蒜黑不知蒜見毒未必即黑姜見毒則必黑何若以姜驗之為愈也範本卷十二大毒菌大毒菌其形似柳菌亦生柳樹下然柳菌其邊不朝上仰此菌邊向上翻食之即亡解此菌毒宜用苦茗白礬為末水調服可解採此毒菌煮銅器變色範本卷十二松橄欖松橄欖味苦甘性微寒治大腸下血積熱之毒療內外九種痔瘡附方治牙齒疼將松橄欖於疼牙上咬住疼即止務本卷三牛肝菌牛肝菌氣味微酸辛性平主治清熱解煩養血和中凡菌冬春生者無毒夏秋生者有毒或帶赤色自下卷上者有大毒或上無毛下無紋者均勿食恐有蛇過其下食之令人毒殺不可不慎也未食須以姜米驗之於先若姜米色黑必有大毒既中其毒須掘地漿水或苦茶同明礬調水解之範本卷十一羊脂菌羊脂菌色白味甘性寒無毒主治清肺胃去內熱惟患冷疾腹痛泄瀉者忌食範本卷十一青頭菌青頭菌氣味甘淡微酸無毒主治眼目不明能瀉肝經之火散熱舒氣婦人氣鬱服之最良但不可多食食之宜以姜為使範本卷十一木上森木上森形似白森貼於木上採取主治外科一切瘡毒已出頭未出頭圍搽敷之能消散熬水洗癩瘡其效如神一治楊梅結毒年久不愈用火煅為末加冰片共研調油搽立愈並貼無名腫毒範本卷九杉菌杉菌氣味辛平性溫無毒主治心脾暴痛先輩云菌感天地陰陽濕之氣而生多發人之冷氣宜用生薑以解之範本卷十一松菌松菌氣味苦澀而淡性平專治小便不通或不禁可以分利水道亦治五淋白濁食之最良往往謂是菌為有毒者非菌之有毒耳以菌下多有蛇臥故用姜以驗之使人預知有毒無毒也範本卷十一皂莢菌皂莢菌有大毒不宜食之治有積垢作痛泡湯飲之令微瀉若猶未已再飲多食此菌令人恍惚範本卷十一百葉尖百葉尖生山中石上緑色一條小葉俗呼蜈蚣草味酸澀甘無毒治一切跌打損傷筋骨疼痛四肢麻木風濕痿軟泡酒服之其效如神敷傷亦可務本卷一上蜈蚣草味甘酸辛性平無毒主治筋骨疼痛左癱右瘓半身不遂偏枯麻木之症以酒為引其效如神範本卷十一金星鳳尾草金星鳳尾草味苦性寒古本附注解硫黃毒升丹輕粉毒今用洗暴赤火眼老年昏花退翳膜遮睛煎湯候溫或洗或用筆管吹叢本卷中接筋藤接筋藤形似皮條有小葉身上有毛無花氣味甘性平主治跌打損傷散血和血筋骨疼痛以酒為使服之即愈範本卷六筋骨草生大川石上亦有緑葉無花氣味甘酸無毒主治筋骨疼痛濕氣流痰手戰腳軟以燒酒為使立瘥筋骨草有二種當細辨之範本卷五麻黃麻黃味苦辛性溫入肺經治鼻竅閉塞不通香臭不聞寒邪入於太陰肺經肺寒咳嗽藥苗散寒邪而發表汗根節止汗實表氣固虛清肺氣消咽噎噎即喉中梅核之氣咽不下吐不出是也麻黃氣虛弱者禁用恐汗多亡陽附方治傷風后寒邪斂注於肺經鼻塞不通不聞香臭鼻流濁涕或成腦漏麻黃五錢乳浸曬乾陳皮三錢桔梗二錢梔子二錢炒川芎二錢黑豆三錢去殼炒共為細末每服一錢竹葉湯下務本卷三鐵線牡丹鐵線牡丹止嘔吐噁心吞酸吐酸痰厄逆反胃吐食胸膈胃口作痛飽脹慒滷有暖胃進食之功下行入腎扶助命門相火衰弱溫丹田補火興陽附方治反胃嘔吐飲食胸膈飽脹胃口疼痛吞酸吐痰鐵線牡丹花蕊葉梗根俱可用為細末每服一錢五分滾水點酒服忌魚羊蛋蒜生冷務本卷三鐵線牡丹形似牡丹延蔓而生花開碧緑色大瓣中又開細瓣氣味苦有微毒主治一切瘡科外敷內服範本卷七繡球藤繡球藤生山中有水處其藤貫串有小細葉一撮生於藤上味苦性微寒無毒主治一切下部生瘡腎囊風癢洗之神效治天疱瘡焙乾細末撒瘡上三劑神效俗呼楊梅結毒又燒灰治鼻疳瘡吹入鼻中或中毒於肺鼻不能聞香臭者吹之鼻竅即通務本卷一上月下參月下參味苦平性溫熱治九種胃氣疼痛此藥能開胃健脾消宿食止面寒背寒胸膈噎食寬中調胃痞滿肝積左右脅痛嘔吐作酸附治噎食病奇方此病因飲食著氣而成飲食不下一下即噎食令人胸膈脹滿脅肋疼痛肩背脹痛月下參三兩檀香三錢沉香三錢白豆蔻二錢木香一錢共為細末每服二錢開水點酒服又治酒寒效方兼治胃氣面寒背寒痞塊肝氣不舒五積六聚兩脅疼痛等症月下參二兩廣木香一錢丁香二錢沉香二錢肉桂二錢共為細末每服一錢燒酒送下服後忌魚羊蛋蒜冷水酸菜苦菜用之反性務本卷二石南藤石南藤又名搜山虎味甘微酸性微溫入肝膽小腸三經治風寒濕痹傷筋祛風筋骨疼痛利小便及莖中痛熱淋初起急速治效生山石上者走經絡更效生土地上者利小便效附方治熱淋莖中痛或如膿糊住馬口石南藤二錢木賊八分甘草一錢八仙草二錢水煎點水酒服務本卷三石南葉氣味辛苦性平主治散風堅骨補內傷陰衰利筋骨皮毛亦治腎虛腳弱風痹之要藥範本卷十馬檳榔馬檳榔即馬金囊水檳榔其仁有紋盤旋似太極圖又名太極子味微苦澀回甜性涼入肺脾二經清熱解煩渴子入藥嚼之飲水愈甜治咽喉炎附方孕婦難産氣滯血瘀難下用馬檳榔二錢當歸五錢川芎三錢車前子一錢煎水服有催生之效體虛弱禁服琴本甜葶藶子甜葶藶子又名麥藍菜味苦辛性寒主治下氣定喘消痰利小便消水腫療麵皮浮腫附方治麵皮浮腫或咳嗽喘吼大腹皮生桑皮葶藶子引用通草煎服氣喘加蘇子小便澀加木通車前子務本卷三白花地丁白花地丁氣味苦甘性平清熱解毒散瘀消腫主治酒痔血痔牝痔牡痔痔瘡生管單劑煎點水酒服醫家諸藥不效服此神效務本卷二細辛細辛白花者可用紫花者不入藥味苦辛性溫陰中之陽也祛風明目止頭風疼療牙齒疼攻癰疽毒瘡附方治癰疽紅腫咬痛細辛不拘等分煎湯點水酒服有膿者潰無膿者散務本卷二苦遠志苦遠志味甘微苦性微寒入心肝脾三經養心血鎮驚寧心定驚悸散痰涎療五癇角弓反張驚搐口吐痰涎手足戰搖不省人事縮小便治赤白便濁膏淋滑精不禁點滴不收良效附方治滑精不禁點滴不收頭暈耳鳴腰痛小腹脹痛苦遠志三錢水煎點水酒服滑精加金櫻子一錢白濁加臭椿皮一錢赤濁加土茯苓二錢又方治癇症驚搐手足戰搖角弓反張不省人事口吐痰涎苦遠志五錢膽南星一錢皂角子十五粒引用沙糖水煎服又方治同前苦遠志三錢豬牙皂一錢石菖蒲一錢膽南星一錢辰砂三分另末琥珀五分另為末引用燈芯煎藥調二味服務本卷三紫花地丁紫花地丁味苦性寒破血解諸瘡毒攻癰疽腫毒治疥癩癬瘡九種痔瘡消腫單方治小兒走馬牙疳潰爛腥臭用紫花地丁根不拘多少用新瓦焙為末搽潰爛處愈叢本卷上紫花地丁即丁蒿一名地丁今處處有苗覆地有五色紫花者多用入藥氣味苦辛性寒無毒破血主治一切癰疽發背痔漏疔腫瘰瘤無名腫毒惡瘡服之點無灰酒下範本卷三黃參黃參滇中昭通最多細葉黃花軟枝根大而肥𨹤山亦有氣味甘性微溫無毒主治補五臟安精神定魂魄止驚悸除邪氣明目開心益智久服輕身延壽療腸胃中冷心腹鼓痛胸脅逆滿霍亂吐逆調中止消渴通血脈破堅積令人不忘一治五勞七傷諸虛百損消胸中痰多嘔噦補五臟六腑保中守神治肺痿及癇症冷氣上逆傷寒不下飲食虛夢紛紜者加之止煩躁變酸水消食開胃調中治氣殺金食藥毒治肺脾陽氣不足肺氣虛促短氣少氣補中暖中泄心脾胃肺中邪火止渴生津液一治男婦一切虛勞發熱自汗眩暈頭痛反胃吐食痎瘧滑瀉久痢小便頻數淋瀝中風中暑痿痹吐血嗽血下血血淋血崩胎前産後諸病立瘥範本卷三抽筋草抽筋草又名蟲兒被單味微苦性涼入肝脾二經消水腫治風濕筋骨疼水煎服外敷瘡毒效於本卷下土人參土人參味甘性寒補虛損勞疾婦人服之補血務本卷一下土茯苓金蕎麥土茯苓一名冷飯糰子名仙遺糧味苦微澀性平治五淋赤白濁兼治楊梅瘡毒附方治婦人紅崩白帶土茯苓水煨引用紅沙糖治紅崩白沙糖治白帶又方治楊梅瘡毒土茯苓或一兩或五錢水酒濃煎服又方治大毒瘡紅腫土茯苓為細末好醋調敷補注子名仙遺糧治楊梅結毒丹流等症務本卷二金絲蓮金絲蓮形與地荷葉相似延蔓而生葉有六方花開五瓣黃色似鈴又名金獅鈴氣味甘苦性微寒專治包傷打傷或無名腫毒或筋骨疼痛熬水熏蒸即愈範本卷七山茶花山茶花氣味甘微辛專治一切大腸下血肺中有瘀血或吐血之症急用此花煎湯服之無花即葉亦可但不如花之神效也均宜以童便為使範本卷十滇中茶葉滇中茶葉氣味甘苦性微寒主治下氣消食去痰除熱解煩渴並解大頭瘟天行時症此茶之巨功人每以其近而忽之範本卷十金剛杵金剛杵色青質脆如仙人掌而似杵形故名味苦性寒有小毒主治一切丹毒單腹脹水氣血腫之症燒灰為末用冷水送下一次可消不可多服若生用性同大黃芒硝之烈欲止其毒雙手放在冷水內即解也民族地區呼為冷水金丹用者須審虛實慎之務本卷一上金剛杵滇中最多人用以為牆其性寒通大小便胸中食積痞塊能消民族地區用此同蕎麵搗為丸治臟結瘟病服一丸即通瀉之範本卷四白桄子白桄子俗名白脬氣味甘微酸性平主治肺癰咳嗽清痰解熱凡血風瘡及筋骨疼痛皆能療治範本卷十大紅袍大紅袍又名野黃豆鏽釘子味苦微澀性溫調經活血止血除瘀附方治婦人血崩不止大紅袍五錢鑽地風五錢煨紅糖服即止又方耳底發炎疼痛大紅袍鮮根擠汁滴注又治胃氣疼大紅袍煮雞蛋吃於本卷下黃花地丁黃花地丁味苦微辛性寒發散瘡癰解瘡毒腫痛入肺消痰定喘止咳嗽肺痿等症單方治久遠咳嗽痰喘氣粗喉內如拽鋸之聲夜臥不寧用黃花地丁二錢蜜炒響鈴草二錢蜜炒竹葉為引煎湯服之叢本卷上黃花草黃花草生田邊串枝開黃花結黑小子味苦性寒主治熱結火症日夜燒不退五經血燥煎