治風眩痰症男子五勞七傷小兒驚癇癲搐開胃健脾食之神效病人忌服又能動風務本卷一下豭豬肉豭豬肉味酸冷療狂病補腎氣虛弱久病不愈者食之可漸愈頭發風散氣同五味煮食補虛蹄能下乳通血脂味甘臘月煉淨收用治癰疽破冷結散宿血利腸胃血治痘瘡倒靨烏頭陷頂食之能起長升漿能補血不足心補心血不足治中風不語肝治小兒驚風反烏梅大黃等務本卷一下馬肉馬肉味辛苦冷有毒治傷中除濕熱下氣長筋骨強腰脊壯健強智輕身耐飢治寒熱痿痹鬃燒灰敷瘡毒癰疽疔瘡神效蹄燒灰為末調油搽禿頭瘡癬疥皮燒灰調油搽銅錢牛皮癬立效務本卷一下狗肉狗肉味酸咸性溫無毒微臊安五臟補純陽輕身益氣補益腎胃壯陽道補腰膝益氣力治五勞七傷補血脈而厚腸胃補下焦而填精髓和五味煮空心食之蹄氣味酸性平治癲狂病血氣味鹹補五臟心治憂恚氣除邪腎氣味平治婦人産後瘧疾性反商陸大蒜杏仁用者記之務本卷一下七星菌附篦菌等十六種七星菌範本附圖生山中陰濕處形似牛肝菌背後有七點黃斑味甘美辛性平無毒主治五勞七傷諸虛百損婦人尸勞瘵症能殺癆蟲人多忽其功效範本卷十二以上五色諸菌人多不識往往不細為分別誤將毒菌視為無傷致令毒殺深為可憫今特一一分別詳明使人知所採擇凡有未識者宜加姜米或金銀器同煮倘有黑色斷不可食外有一種番腸菌其形與見手青無異採來撅開亦系見手即為青黑但其味苦麻若誤食之肚腹定為疼痛解亦當以姜米及金銀器預為辨之方無舛錯蓋菌之種類甚多不能盡述五色諸菌外復有反黃反青反白反黑反赤諸菌不可食又云所謂反者若青面白背者是也余可類推及二十三種性各不同亦並分別言之以便臨時有所考察者也篦菌形矮有毒困木菌微甘性惡萠栗菌苦寒人食多生癭滯氣桑花菌味甘美人難得食食者強壯延年柏木菌苦寒有小毒苦竹菌有大毒楓菌寒澀有毒麻菌苦寒人食發瘡柳菌散血人面菌似雞㙡有大毒食之即死番腸菌有大毒腐草菌有毒馬蹄菌形似馬蹄味苦澀胭脂菌可為外科藥癩頭菌味辛食之令發蒼番花菌背黑麵赤誤食損齒落髮總之青黃赤白黑五色菌可食五菌之外其色必雜色必須種種審明方可採用倘毫釐有差誤傷性命切宜慎之範本卷十二天花菌天花菌範本附圖氣味甘性平無毒色白味佳主治補中益氣健脾寬中亦治小兒五疳蟲疾食之可化凡煮菌者入金銀器同煮不黑可食黑者勿用此菌曬乾研末敷惡瘡可消潰爛出頭者敷其瘡邊自可痊愈範本卷十二竹菌竹菌範本附圖家園生者氣味鹹性寒無毒和薑醋食最良主治能解五臟六腑熱結亦治赤白痢疾同豬肉食益脾補中外有一種苦竹菌有大毒不可用味苦麻範本卷十一人參人參初生時小者三四寸許一丫五葉葉細小至十年生十數枝枝上細葉長至三十年其根有變人形者故曰人參味甘微溫無毒君藥也主補五臟安神定魄止驚除邪明目開心益智久服輕身延年療腹鼓痛胸脅逆滿霍亂調中止消渴治五勞七傷虛損痰弱止嘔噦保中守神消胸中痰治肺痿及癇症冷氣上逆傷寒不下食治肺胃陽氣不足肺氣虛弱務本卷一上土人參生𨹤山谷同遼東其根形狀如玉竹而潤實春生苗産於深山背陰濕潤處初生小者三四寸許一丫五葉四五年後生兩丫五葉未有花至十年後生丫五葉年深者四丫各有五葉中心生一莖俗名百尺杵三月四月有細花如粟蕊如絲紫白色秋後結子或七八枚如豆大青熟自落根如人形者乃年深浸漸長成者氣味甘微溫無毒君藥也範本卷三土余瓜龍蛋草土余瓜一名龍蛋草非真龍蛋草也真者已序於前生山中有水處葉似小薊根大而肥氣味甘美同茯苓搗為丸治水腫氣腫血腫單腹膨脹服此即消久服延年益壽採葉敷癰疽發背疔毒神效即楊梅結毒服七劑神效忌發物生冷莫將倒掛土余瓜認為土余瓜可配茯苓為使最良範本卷五土余瓜倒掛土余瓜土余瓜倒掛土余瓜生山崖倒掛緑葉黃花其花按一年開一朵結一臺梗藤棉軟至十二年根成人形味甘無毒採取同雲苓熬膏服之黑髮延年務本卷一上土練子土練子生於山中其葉似地草果葉中結一大子子內有黑水染鬚髮即黑味甘性寒無毒主治一切濕氣流痰風癩四肢瘡毒小兒大瘡胎毒取子燒灰存性酒服治七十二症瘋痰若遇狂瘋亂打人者服之即愈根能消積食消痞塊中膈不通葉敷瘡疽癰發背如神此草一分能治小兒臍風嘬嘴驚風吐瀉務本卷一上萬年松萬年松俗呼笞帚菌一名千年菌生於青草叢中似松青草又似瓦松佛指甲味苦性微寒無毒採之治一切疔瘡大毒癰疽發背無名腫毒敷之神效務本卷一上萬靈丹萬靈丹生於朝陽之地溪水之邊名曰矮陀陀又曰矮槐又曰萬年青此藥樹似小槐枝冬不老夏不枯秋不落葉連根帶葉採來陰乾搗為細末每兩入甘草三分治諸般危症傷寒癱瘓五勞七傷風寒暑濕傷風瘴氣不論男女小兒風疾痰喘男子遺精女子赤白帶下經水不調五臟煩熱胎氣不安産後血氣攻心心酸嘔厄損骨跛跏肚腸蠱脹氣盛成塊一切諸般雜症並皆治之凡用此藥體實者用五分體虛者用三分隨症隨引而用李本矮陀陀緑葉緑梗黑根生於朝陽之處溪水之邊冬不凋春不再茂新鮮時梗內有白漿心細菊花形結黑子年久根上結瓜黃花有毒不可入藥白花第一紫花次之治病甚多通志卷六十八引滇南本草大皮蓮大皮蓮味苦微辛性微溫治瘀血結滯腹疼破血行血跌打損傷瘀血墜胎下血塊等症點水酒童便服務本卷二大皮蓮味苦辛性微溫性與小皮蓮同主治消瘀血而止血積疼痛服之可效妊婦忌之不可妄用範本卷四小皮蓮小皮蓮味苦微辛性微寒治瘀血結滯或産後腹痛或經期腹痛散血塊破癥瘕發熱頭痛寒熱往來有如瘧狀退虛熱治跌打損傷服時忌生冷魚羊附方治痰血結滯肚腹氣痛發熱小皮蓮三錢煎湯點水酒童便服血虛忌用又方治退諸虛燒小皮蓮三錢水煨露一夜點水酒清早溫服務本卷二山芭蕉山芭蕉高尺許氣味辛苦有毒不可妄服只可作外科敷瘡散毒脫管生肌或未出頭者圍邊留中心以備出頭若膿血流出用此為末圍未破之處可托內瘡毒之管其根最良範本卷十三仙菜三仙菜此草生有水處形似灰挑菜有子子大如天天茄大青色味甘美無毒連根葉子同熬成膏每日清晨服一二錢延年益壽癱瘓痿軟其效如神作菜食之令人肥胖忌大蒜兒茶務本卷一上三葉還陽草三葉還陽草形似車前草二苗上有細黑子根肥白而大主治一切血症性走十二經絡專補腎烏須黑髮延年益壽採治癭袋神效子能敷太陽止年久偏正頭風赤眼最效範本卷四水毛花水毛花有大毒此草生於水中形似毛槍梅花葉採取曬乾為末用作麻藥剮瘡不疼或剮尿結先搽此藥剮之不疼務本卷一上不死草不死草形與打不死草異硬枝小葉開黃花根直如劍味甘性寒無毒主治跌打損傷筋骨疼痛範本卷五雙尾參雙尾參滇中𨹤山亦有氣味甘甜性微寒無毒專治男婦老幼一切風痰昏迷五癲或怔忡如有人捕捉之狀久服消痰鎮驚安神定魄用之效即氣癲色癲可解一治婦人生一胎後久不生産服之暖宮調血順經亦可妊也一治胎前産後血積衝心神效採葉治小兒驚風即七日內外皆愈範本卷三鳳尾參鳳尾參産滇中𨹤山細葉軟枝根似人參形十年可成人形採根用氣味甘性微寒走十二經絡散寒祛三腫範本卷三石布石布生於大石面上隱隱似布形扯起一塊內有筋紋似大葉人多不覺此物生於石上也氣味苦性微寒主治吐血血衄血痢血崩去濕痹生肌治冷風歷節疼痛止尿血取汁潤髮敷湯火傷止痛煎湯服之殺蟲療蠱痢範本卷九石龍草石龍草生石上花似丁香花葉似桃葉枝梗無刺味苦無毒採梗枝煎服治一切眼科神效務本卷一上龍竹草龍竹草此草生石上或大山中有水處形似竹葉軟枝黃葉根肥味酸無毒治一切腎虛腰疼男子陽縮婦人宮冷炙用延年務本卷一上龍吟草龍吟草生山中向陽處斷梗有絲大葉黃子根大白色味甘平無毒採根服之延年益壽固齒烏須黑髮採葉服之治大頭傷寒症神效採根治舌上生瘡名曰重舌服之即愈務本卷一上龍鱗草龍鱗草生松樹上貼皮上似鱗甲此草有二種一有枝苗此無枝苗味苦無毒主治童勞虛症退熱除煩婦人崩漏血積煎服最良範本卷六白雲參白雲參俗呼還陽參一名白奶參獨枝緑黑葉根肥嫩內有乳汁只可用根味甘苦無毒入肺肝腎三經同豬肉煮食主人大生氣血補腎添精又婦人乾血勞食之更效附方婦人虛勞盜汗白雲參煨豬肉吃氣血雙補務本卷一上白雲參對葉形似桃葉白花根肥味甘平無毒此參止渴生津化痰明目養心引血歸元而安神範本卷三白龍參白龍參生山中有藤藤上有葉葉下有小黃花根大而肥白其形如參味甘無毒採取服之延年益壽同豬肉煮食暖腎添精同牛肉煮食補氣同羊肉煮食補氣止汗同雞肉煮食治癆病生服令人白胖婦人食之止盜汗治白帶男子腎虛皆效務本卷一上對葉參對葉參味甘苦性平無毒主治九種氣痛筋骨寒冷癥瘕酒積食積痰火瘀血作痛以酒為使最為神效範本卷三平爾參平爾參味甘平性溫無毒治脾氣弱中氣不足飲食無味五勞七傷肢體痠軟虛熱畏寒面黃消瘦此藥調治精神養榮氣血補中氣但脾胃中如有積痰或有寒濕者服之令人發水腫若服後周身腫滿即煎苦菜湯食之令小便利數次其腫自消附方治脾胃虛弱中氣不足勞傷虛損平爾參三錢筍雞一隻將參入雞腹煨服凡補虛用雞男用雌女用雄附案昔史明九用平爾參治石羊廠爐煙瘴氣治午後怕冷作寒抖戰夜晚發熱天明出汗方涼治煙瘴用平爾參末三錢引水酒服三次後用平兒參煨母雞一隻食之補注平兒草平爾參有辨別平爾參枝梗矮稈是方稈花開一樣但背無毛格蒂葉同一樣根小稈紅色平兒草梗高大稈是圓稈開花一樣但花後有毛格蒂葉同一樣根大稈紅色叢本卷上打不死草打不死草生山澗中細葉軟枝根肥而白上有須氣味甘性微寒無毒主治骨碎筋斷瘀血不散跌打損傷以酒為使範本卷五地竹地竹又名土余竹地余竹生於郊野無花就地生小軟枝高一二寸葉似家竹亦非淡竹乃地竹也味苦無毒採取為末治男婦老幼眼目昏花或云翳遮睛或疳疾傷眼服之其效如神同苦蒿尖馬鞭梢尖枸杞尖共搗為泥遇暴赤火眼左眼塞左鼻右眼塞右鼻效務本卷一上地竹氣味苦無毒主治骨蒸勞燒虛勞發熱服之能退五經之熱兼利小便範本卷八地纓子地纓子此草形似纓子一撮貼地而生分赤緑二色味苦性寒赤絲者治脫陽服之如神緑絲者治脫陰服之如神務本卷一上地纓子土細辛地纓子亦名土細辛形似蒲公英根細如絲月白青色氣味辛性溫無毒主治咳逆上氣頭痛百結拘攣風濕痹痛久服明目輕身延年亦利九竅專治眼疾或內障外障白翳遮睛同青羊肝為末服即愈範本卷四血參血參肥似人形滇中性燥産遼東性寒採根用糯米蒸透紅潤色主治骨間寒熱驚癇邪氣接續陽氣定五臟救蠱毒除胃中伏熱時氣溫熱泄痢去腸中小蟲益肝膽氣止驚惕久服益志不忘輕身耐老客忤疳氣熱狂明目止燥煩治瘡疥去目中之黃及睛赤腫瘀肉高起痛不可忍退肝經邪熱除下焦濕熱之腫瀉膀胱火療咽喉痛風熱盜汗範本卷三雞尾參雞尾參葉似雞尾緑色軟小枝無花根似人形人多不覺味甘辛性寒無毒主治眼目不明或內障外障雲翳遮睛小兒疳疾雀盲化蟲除痞或肚大筋青亦治婦人五夜虛燒骨蒸熱此藥服之立瘥範本卷三還元參還元參生有水處形似竹筍初出包葉而生出一軟苗苗上開黃花其根似人參有橫直紋味甘而美無毒採根久服令人白胖延年益壽民族地區常作菜用呼為牛菜因牛食此草而生牛黃故曰牛生草務本卷一上迎風不動草迎風不動草生山中獨莖數枝緑葉開黃花採取治瞽目務本卷一上金錢草金錢草味酸無毒生𨹤山滇中甚多葉似虎掌草花似栗花軟枝三年生葉一臺分一丫丫上生花採服延年務本卷一上金纏菜金纏菜一名鐵梗金纏子生有水處葉小梗硬故曰鐵梗根生一軟枝枝上有黃子四月採子八月採根九蒸九曬熬成膏味酸無毒能辟穀作菜鹽炒久服令人面容肥白能補腎添精大補元氣穩齒烏須延年益壽子放於酒內一時其酒即化為水即將此水治筋骨疼痛神效務本卷一上青霞草青霞草生有水處向陽地方有大葉花似梅花枝梗有刺味酸辛採取熬膏服之祛病延年務本卷一上青花黃葉草青花黃葉草生於山野間花似大楓子花緑黃葉開青花今𨹤山甚多味甘無毒採葉洗眼疾採花汁點翳眼兼散腫採根為末治痘封眼神效務本卷一上樹包樹包諸樹生包包內有水乃樹之津液氣味甘甜性平無毒主治五勞七傷諸虛百損肺癰熱毒亦治中風口眼歪斜偏枯之症染髮久服輕身延年又取包燒灰治惡瘡疔毒敷之即散此水用磁器盛之黃蠟封口備用範本卷六劍草劍草有大毒生山野間葉似草蘭花旁生大黃葉酷似車前草而無花煅為末敷惡瘡甚效務本卷一上貼地金貼地金生於陰處形似車前草生軟苗一枝枝上有黃絨細毛數撮味甘無毒主治楊梅瘡傷鼻或鼻上先有細點現出速服此藥可救鼻不傷也又解一切瘡毒神效務本卷一上茶匙草茶匙草味苦微辛性溫專治面背寒疼腰膝痛肚腹疼寒氣痛或為末或煎湯點水酒服叢本卷中掛壁青掛壁青葉上有毛開黃花高四五寸許氣味苦酸平性寒無毒乃大寒純陰之草也故主大熱主治一切身熱煩邪並解諸蟲虺蛇毒傷惡氣兼治小兒遊火金瘡服之立瘥範本卷十胡麻胡麻非皆俗入藥之胡麻也生山中朝陽有水處緑葉紫背相對而生根肥大連有子採根熬去苦水氣味甘甜性微溫無毒主治諸虛百損五勞七傷補中益氣久服令人烏須黑髮延年益壽同側柏葉食之香甜無比或熬膏和丸每丸重一錢隨引救民治瘟疫遍散傳染一方每人一丸赤小豆煎湯送下神效範本卷五珍珠一枝蒿珍珠一枝蒿味苦性寒利小便瀉膀胱積熱除五淋治便濁發散瘡毒單方五淋初起便濁單劑水煨點水酒服叢本卷下鐵蓮子鐵蓮子此草黑子淡黑根形似烏飯果軟枝無葉味甘酸無毒主治一切酒毒成疾治中膈存痰胸中痞塊食積周身疼痛吐酸冷水或因酒色成癆發者腎氣崩疼服數劑即愈務本卷一上瓶兒草瓶兒草味淡性微溫行經絡消氣結散瘰癧馬刀結核鼠瘡潰爛膿血不止補氣血虛弱調元搽癬瘡小兒黃水瘡婦人陰癢生蟲洗之良附奇方治痰核結核氣瘰馬刀瘰癧潰爛瓶兒草大薊蒲公英牛蒡子點水酒煎服又方治症同前全歸二錢瓶兒草三錢連翹一錢靈仙一錢夏枯一錢牛蒡子一錢銀花一錢防風五分川貝母五分水煎點水酒服又方治氣血虛弱者用瓶兒草一味黃牛肉二兩共一處煮爛食之三四服效務本卷二倮羅藝香草倮羅藝香草味微苦性微寒在表症清六經實火解表邪發汗甚速消乳蛾痄腮硬腫攻瘡瘍紅腫清散出頭有膿者潰破無膿者紅腫退散並退男婦勞熱附方治腋汗狐臭將新鮮挖倮羅藝香草挾腋下其臭汗自止補注倮羅藝香草與毛葉云香草根葉一同葉微黃色鼻聞有香草香味毛葉云香草無香草香味務本卷中真矮它它頭真矮它它頭訛傳矮它它多産於西番國獨滇中逆水亦有而今錯認山皮條為矮它它山皮條則有小毒苦寒下氣真矮它它頭軟枝大葉無花葉上生黑子氣味甘辛無毒入十二經絡通五臟潤六腑生津益氣有人參之功效範本卷三黃花子黃花子生荒野中大葉黃子子上有黑點開黃花可作菜食味甘酸無毒治一切陰虛火盛脫陰脫陽之症神效同五味鹽炒焦下飯久吃令人白胖延年益壽又能益胃健脾務本卷一上黃毛金絲草黃毛金絲草生山中緑葉貼地上有一枝或分杈枝上開黃花如絲數朵根上有大果其甜如蜜採之服久輕身益壽務本卷一上甜遠志甜遠志味甜性微溫主補心肝脾腎滋補陰血補養精神潤澤形體止面寒腹痛止勞熱咳嗽治婦人白帶腰痛頭眩耳鳴男婦虛損洵為要藥單方治婦人産後蓐勞症發熱出汗飲食無味甜遠志去皮乾用五錢生用一兩筍雞一隻去腸將藥入雞腹內煮爛空心服之效補注蓐勞蓐産中之名也産後虛弱氣喘乍寒乍冷乍熱之病也如瘧狀名曰蓐勞此是虛弱也又有因産後著氣肝血受鬱而作蓐勞蓋氣血不相順接氣虛故乍寒血虛故乍熱寒熱自汗無時休息症狀似瘧實非瘧也治宜大補氣血甜遠志補氣補血筍雞氣血之物用以佐之叢本卷上盤地藤盤地藤葉似荷葉輕輕軟枝盤地而生梢上細花根大而肥氣味甘甜無毒性走陽道亦行任督二脈通十二經絡分陰陽利小便除內熱久服延年益壽生津養肺潤五臟而清六腑烏須黑髮範本卷六庵䕡子庵䕡子症其效如神搗敷患處亦最為有功範本卷十梅花草梅花草形似梅花小朵生石崖上氣味甘苦無毒治婦人血崩血塊散氣通經利水胃中冷痛內疝癥瘕即消食積成痞堅硬疼痛服之立瘥範本卷六紫葉草紫葉草形似薄荷黃紫葉無花破心看之枝如燈草綿軟味辛無毒主治一切目疾暴發火眼採枝葉熬水洗眼退內障外障一切雲翳洗之如神務本卷一上紫背雙葉草紫背雙葉草生江邊有水處或大海邊亦有之葉似梅花五瓣根結二果果上有須氣味甘辛苦性寒平無毒主治肌膚如柴能生血和血肥肌健脾理中久服延年益壽亦治噎食轉食反胃養脾生精潤肺小兒疳疾目盲化痰定喘安神亦治氣癭食癭痰結成袋或因水生癭袋噙之即散範本卷六筋骨草筋骨草四穗開黃花結實三稜類篦麻子味甘辛無毒五月採取治風濕有暖骨祛風之功故名筋骨草又名暖骨草亦名接骨草民族地區用接骨敷傷止血定痛治一切風濕筋骨疼痛拘攣寒濕腳氣遍身癬瘡疥癩泡酒服治一切痿軟痰氣五勞七傷服之如神入藥苗花並用形與馬鞭草大不相同馬鞭草葉如菊紫花暖骨草尖葉黃花治療亦異用者宜審普濟方治反胃吐食暖骨草獨棵民族地區經驗治一切腫毒初起敷之即消接骨用酒服末五錢三劑即愈忌蛋蒜務本卷一上蛤蟆藝香草蛤蟆藝香草味苦性大寒瀉六經客熱退男婦諸般虛熱勞熱治有汗骨蒸煩熱退子午潮熱單方治童男幼女虛熱諸藥不退者服之良效産後數月發熱不退涼者效蛤蟆藝香草三錢引用童便點服劉乾云一名倒提壺治男婦奔豚疝氣量人之虛實佐以消補中氣藥而用叢本卷上纏瓜草纏瓜草生南瓜地中延蔓而生細葉白花有心氣味甘苦性平主治魚皮癩痘風瘡魚風瘡一切風癩洗之如神範本卷十二蜜雜雜蜜雜雜一名醉仙草一名救疾草産滇中味甘甜性微溫入胃厚腸止水瀉日久治赤白痢用沙糖同煨服昔滇中傳染腸瘟個個痢疾後有醫士範文公用此草同糖炒服救萬民又方跌打刀傷肉破搗調糖敷口上務本卷二白沙蚓白沙蚓生石峽內形似蚯蚓身上有白圈毛細尾宜良最多人多不識氣味甘辛無毒主治小兒三十六驚風六淫風邪疫症男婦老幼中風不語或左癱右瘓四肢不仁搗爛火煅酒下神效一治男子精寒陽縮敷肚臍可興也範本卷七
