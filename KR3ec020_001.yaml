膨脹務本卷二天天茄天天茄味甘苦性大寒治小兒風熱攻瘡毒洗疥癩癢痛祛皮膚風熱用枝葉叢本卷下天天茄一名救兒草一名後紅子味苦性大寒今滇中多有主治小兒風邪熱症驚風化痰解疾亦治痘風瘡遍身風癢疔可攻能散採葉洗瘡其效如神範本卷四土瓜山土瓜土瓜味甜性平無毒一苗便葉似何首烏根下結瓜主治補脾解胃熱而寬中利小便止大腸下單方土瓜皮點水酒煎湯服治膀胱偏墜氣痛或一子大硬補注紅土瓜入脾胃二經得土之氣故有補脾之說血入胃脘大腸下血治效叢本卷中白雲瓜白雲瓜味甘甜無毒生金沙江邊有水處梗甚硬緑青淡黑葉開紫花根下結瓜生食令人不飢葉治傷寒頭疼不問陰陽兩感或陰毒或陽毒或有汗或無汗或亂語失汗肺津火盛鼻血不止或産後傷寒服之神效梗燒灰治走馬牙疳瓜熬膏治中風不語或痰湧氣結左癱右瘓半身不遂酒毒流於四肢不能行動每服一錢開水下神效花為末治腦漏皮為末調蜜搽鼻糟務本卷一上金鐘茵陳金鐘茵陳味苦性寒利小便療胃中濕熱痰發黃或眼仁發黃或周身發黃消水腫服後忌豆叢本卷下烏藥烏藥一名臭牡丹味辛苦性溫消胸膈肚腹脹下氣利小便消水腫止氣逆腹痛烏藥花治婦人紅崩點水酒煨服叢本卷下夏枯草白花夏枯夏枯草有白花夏枯有益母夏枯味辛微苦性寒入肝經治肝熱除肝風暴赤火眼目珠夜脹痛外障可用內障不可用開肝鬱行肝氣單方止牙齒疼痛燒洗凍瘡蓋因冬至發生稟純陽之氣至夏而枯故名夏枯草務本卷二夏枯草益母夏枯夏枯草見前夏枯草原文接骨草接骨草一名蓮臺夏枯草又名毛葉夏枯又名燈籠草味苦性溫行十二經絡治筋骨痰火疼痛手足麻木不仁祛周身遊走之風散瘰癧手足痰核治跌打損傷接骨止腦漏鼻淵效包痰火紅腫疼痛單方治一女子兩腿生核形如桃李紅腫硬痛接骨草三錢引點水酒服五服後痊愈至二年又發加威靈仙防風虎掌草三服而愈單方吳姓以此草治跌打損傷紅腫疼痛不能落地接骨草苧麻根蜂蜜雞蛋清大薊共五味搗爛包患處一宿一次三次痊愈日久腫疼加生薑蔥頭三棵再包治痰火發時或手足紅腫疼痛接骨草五錢雞腳刺根三錢土黃連二錢共搗爛點酒包敷疼處三次腫消疼止後加蒼耳白芷川芎去黃連雞腳刺根點水酒煎服三次此二方屢經證驗惟新病可用久病不可用單方治腦漏疼痛鼻流黃涕腥臭接骨草三錢增補加香白芷川芎蒼耳子引點水酒服一人路遇狂風吹著口歪眼斜半身麻木疼用之神效接骨草防風鉤藤膽南星引點水酒燒酒服良效叢本卷上接骨草氣味辛平性溫此草行十二經絡治跌打損傷骨碎筋斷酒下如神或左癱右瘓四肢不仁服之則愈範本卷四繡球防風繡球防風味苦辛性微溫入肝經破肝家滯結鬱氣舒肝氣流結破肝血通經閉祛風熱明目退翳膜遮睛治小兒雀眼白翳青盲殺肝蟲但肝氣實有鬱結者可用若肝虛者忌之奇方小兒痞疳攻眼雀眼青盲雀眼者不有翳膜只晚不見物白翳遮睛繡球防風一兩蛤粉六錢煅共為末每服五分白羊肝三錢竹刀破開羊肝將藥入肝內苧麻綁好入瓦罐內煎吃五服痊愈忌鹽叢本卷上繡球防風味苦淡平無毒主治楊梅結毒癰疽發背無名腫毒洗癬瘡疥癩良其子同地草果為末用黑羊肝煎湯治小兒疳積眼眥最效範本卷八麥穗夏枯草麥穗夏枯草開紫花者形如麥穗又名鐵線夏枯草味苦微辛性微溫入肝經祛肝風行經絡治口眼歪斜止筋骨疼舒肝氣開肝鬱治目珠脹痛消散瘰癧周身結核手足周身節骨痠疼附方治嘴歪或因惡風吹著或因胃痰犯肝口眼歪斜單用麥穗夏枯草一味燒酒服應效或麥穗夏枯草三錢膽南星五分防風一錢鉤藤一錢水煎引點水酒臥時服附案有紀姓者身胖多痰因風吹口歪用麥夏枯點水酒服立愈後傳方與人屢用屢驗叢本卷上黃芩黃芩味苦性寒上行瀉肺火下降瀉膀胱火男子五淋女子暴崩調經安胎清熱胎中有火熱不安清胎熱除六經實火實熱所謂實火可瀉黃芩是也熱症多用之奇方治婦人月水過多將成暴崩治效黃芩一錢酒炒黃柏一錢炒黑色香附一錢五分童便浸白芍一錢龜板二錢酥炙臭椿皮二錢土艾葉一錢炒不用引煎服補注月水過多不止是陰血不足以震動脾土胞絡之火故血走失而越常度也是方用黃芩黃柏制火芍藥龜板滋陰為壯水之主以鎮陽光也艾葉之苦椿皮之澀所以固脫又以香附之辛開其鬱熱耳叢本卷中馬尿花馬尿花一名水旋覆味苦微咸性微寒治婦人赤白帶下生海中草地邊仙人塘近華浦前單方治婦人紅崩白帶水旋覆為末每服一錢水牛肉湯送下叢本卷中良薑良薑味辛性溫入脾胃二經治胃氣疼面寒疼胸腹背寒疼痛積食氣脹叢本卷中草果藥草果藥形如草果而小故名産於寧州薄溪石山味辛微苦性大溫産滇中者最效主治寬中理氣消胸膈膨脹開胃消宿食附方治九種胃氣疼痛面寒背寒疼痞塊積滯疼痛草果藥新瓦焙二兩木香三錢共為細末每服一錢熱燒酒服務本卷三豆蔻即草果味辛性溫無毒生山野中或疏圃地葉似蘆開白花結果內含瓤藏子如豆蔻而粒大能消食積解冷宿結滯之郁開通胃脾快利中膈令人多進飲食今人多用為香料調劑飲食甚良又能祛除蠱毒佩之能遠患也圖考卷二十五引滇南本草金針菜金針菜味甘平治婦人虛燒血乾久服大生氣血務本卷一下漏蘆漏蘆一名蘆蔥又名萱草又名宜男花味甘平性寒治乳結紅腫硬痛乳汁不通乳癰乳岩攻癰瘡滇中産者其性補陰血止腰疼治崩漏止大腸下血附方治男婦腰痛漏蘆根果十五個豬腰子一個以上二味水煎服三次又單方治大腸下血諸藥不效者用此良漏蘆根果十個茶花五分赤地榆三錢象牙末一錢以上四味水煎服三次務本卷三鹿竹鹿竹一名兔竹味甘性平無毒根如嫩生薑色俗呼生薑藥名黃精洗淨九蒸九曬服之甘美俗亦能救荒故名救窮草主補中益氣除風濕安五臟久服輕身延年治五勞七傷助筋骨耐寒暑益脾胃開心肺能辟穀補虛添精服之效矣務本卷一上葳參葳參一名玉術味甘微苦性平微溫入脾補氣血補中健脾脾經多氣多血故氣血雙補脾胃為人之總統後天根本灌溉經絡長養百骸脾胃盛而資以為生者是也蒸露三次曬乾用單方治男婦虛症肢體痠軟自汗盜汗葳參五錢丹參二錢五分不用引水煎服補注此方之義效古書八珍湯葳參補氣丹參補血叢本卷上重樓重樓一名紫河車一名獨腳蓮味辛苦微辣性微寒俗云是瘡不是瘡先用重樓解毒湯此乃外科之至藥也主治一切無名腫毒攻各種瘡毒癰疽發背痘疔等症最良利小便單方治婦人乳結不通紅腫疼痛與小兒吹著重樓三錢水煎點水酒服叢本卷上白芨白芨味辛平性微溫治癆傷肺氣補肺虛止咳嗽消肺癆咳血收斂肺氣務本卷三山稗子山稗子米味甘殼澀根葉苦澀性微寒專治婦人散經敗血之症補注婦人經行每三十個時辰兩日半期故謂經期有準繩有婦人氣血虧損腎肝血虛行經頭暈耳鳴發熱五心煩熱腰疼肚腹冷疼氣脹心慌怔忡血行淡黃色或三天已止或五天再行七八天又行方止故有散經敗血之名單方婦人月水過多將成崩症或已成血崩用山稗子以五錢為度煎湯點水酒服良效務本卷二香附香附味辛性微溫調血中之氣也則有推行之意開鬱氣而調諸氣寬中消食止嘔吐和中養胃進食氣血調而陰陽固守憂鬱開而疾病不生開鬱調氣要藥女人之至寶也補注先賢制十珍香附丸大理府香附十四兩每份二兩分為七份一份用童便浸童便滋離中之陰也一份用好酒浸好酒行經絡一份用醋浸醋開鬱消瘀血順氣一份用鹽水浸鹽水清坎水一份用茴香湯浸滋腎水補腰膝一份用益智仁湯浸上行暖胃下行補腎強志一份用蘿蔔湯浸消痰消食積也春浸二日夏浸一日秋浸三日冬浸五日制畢焙乾以香附為君加蘄艾四兩熟地四兩人參二兩歸身四兩阿膠二兩撫芎二兩淨棗仁二兩炒白茯苓二兩白朮二兩土炒天冬二兩五錢縮砂仁二兩五錢淮山藥二兩橘紅一兩元胡一兩五錢醋炒黃芩二兩五錢酒炒益母草四兩炙草九錢以上俱上好之藥如法炮製共為末水酒煮神麯湯煉蜜為丸每服三錢白滾湯送下叢本卷下必提珠必提珠根味苦微甘平性寒無毒入脾膀胱二經利小便治熱淋疼痛治尿血溺血淋血玉莖疼胎墜消水腫單方治血淋必提珠根二錢蒲公英一錢豬棕草一錢楊柳根一錢引點水酒服叢本卷下甘蔗甘蔗味甘酸治一切百毒諸瘡癰疽發背搗爛敷之汁治心中恍惚神魂不定中風失音頭髮黑暈衝開水下又熬餳食和胃更佳務本卷一下甘蔗氣味甘性微寒無毒主治下氣和中助脾氣利大腸小腸止渴解酒治嘔吐反胃同薑汁服之可解河豚毒同酒食之生痰不可多食多食發虛熱之症範本卷九
