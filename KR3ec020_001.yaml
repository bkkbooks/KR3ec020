葉二錢花椒少許煎湯漱之效或煨吃亦可務本卷三土連翹硬枝碎葉黃花味苦性寒主治五經實熱可散諷誦傷喉可解咽喉痛而少陰火逢之一劑效如神婦人乳結小兒熱痄腮疼痛用之立瘥採花葉敷火瘡熱毒最良範本卷五橄欖橄欖味甘酸性平治一切喉火上炎大頭瘟症能解濕熱春溫生津止渴利痰解魚毒酒積滯神效務本卷一下黃龍尾黃龍尾出滇南嵩明州邵甸里為最味苦澀性微溫調治婦人月經或前或後紅崩白帶面寒背寒腹痛腰痛發熱氣脹赤白痢疾附方黃龍尾三錢杭芍二錢川芎一錢五分香附一錢紅花二錢行經紫黑加蘇木黃芩腹痛加延胡索小茴香水煎點水酒服附方治白帶黃龍尾三錢川芎一錢香附一錢白芷二錢酒炒陳木瓜五錢點白酒汁服如白帶黃色加椿皮附方治婦人赤帶帶土黃色有涎令人頭目眩暈體困寒熱往來腰痛四肢痠軟小便淋瀝陰中癢痛尿急腹脹陰內或如蟲蝕或兼白濁黃龍尾土茯苓赤木通蛇果草八仙草甘草煎水酒服附方治同前症少婦可用老弱忌服黃龍尾三錢馬鞭梢根一錢黑瑣梅根一錢點水酒服單方治面寒疼痛黃龍尾不拘多少焙乾為末點燒酒煎服叢本卷中秋木瓜秋木瓜味苦辛甘性溫治筋骨疼痛痰火腳軟叢本卷中山楂山楂味甜酸性寒消肉積滯下氣吞酸積塊奇方治胃脘有堅久積滯或寒賦胃或飲食結滯嘔吐酸水胸膈飽悶飲食不思倒飽嘈雜吞吐酸水兩脅間有積塊作痛此藥有消積進食之功山查核五錢炒黃色沙苑蒺藜五錢微焙雞肫皮五錢火焙黃色加建曲五錢焙共細末每服一錢滾水送下忌生冷務本卷中枇杷枇杷葉枇杷味甘平治肺痿癆傷吐血咳嗽吐痰哮吼又治小兒驚風發熱神效務本卷一下枇杷葉味苦辛性寒入肺止咳嗽止喘促消痰久咳喉中如曳鋸之聲肺有頑痰結在肺中痰絲隨風氣升降故有吼喘之聲枇杷葉入肺能斬斷頑痰絲消散吼喘止氣促果治哮喘小兒驚風發熱效單方治咳嗽枇杷葉去毛蜜炙煨吃即效奇方治吼喘咳嗽喉中有痰聲枇杷葉五錢去毛川貝母錢半去心叭噠杏仁二錢陳皮二錢共為末每服一錢滾水送下叢本卷中花紅果花紅果味甘酸治一切冷積痞塊中氣不足似瘧非瘧化一切風痰氣滯熬食令人延年葉治小兒瘡疥梗燒灰小兒服之止夜啼務本卷一下花紅果氣味甘酸平寒主治性走足陽明厥陰二經治婦人肝鬱脾虛作脹生食令人生痰吐酸水黃痰小兒勿多食採葉煎服治一切眼目青盲或火眼膜翳最效用燒酒泡食治足軟過三十歲加蘋果同食可輕身或筋骨疼痛泡酒煮每日飲三杯佳忌同魚腥食範本卷九蘋果蘋果一名超凡子又名天然子又名玉容丹味甘香食之生津久服輕身延年黑髮通五臟六腑走十二經絡調營衛而通神明解瘟疫而止寒熱採葉敷臍上治陰症又治産後血迷經水不調蒸熱發燒服之神效務本卷一下蘋果氣味甘微酸無毒主治脾虛火盛補中益氣同酒食治筋骨疼痛用蜜釀久服延年之品也小兒不可多食多食發疳積搽瘡紅暈可散燒灰存性治水中之毒亦能醒脾清神人多爽懷採葉貼火毒瘡或湯火燒灰調油搽之最良皮能治反胃吐痰範本卷九管仲管仲一名番白葉味苦澀性寒治血崩白帶大腸下血用新瓦焙治面寒疼燒酒為引務本卷二杏杏仁杏味酸性熱治心中冷熱止渴定喘解瘟疫但人多食損目勞筋仁治疳蟲葉能敷大惡瘡務本卷一下杏仁味苦微辛性微寒入脾肺二經止咳嗽消痰潤肺潤腸胃消麵粉積下氣務本卷二杏子味甘酸澀性熱有微毒有損無益多食昏神冷膈熱生痰動脾發瘡癤落鬚髮傷筋骨素有目疾忌食小兒及産婦尤忌之杏仁味甘苦性溫有小毒得火良解錫毒殺蟲消犬肉索麵粉積解肌散風邪消痰定喘利膈潤燥能散能降潤喉發音治癲犬咬傷敷之即愈百蟲入耳滴杏仁水即出有雙仁者忌食範本卷九紅梅紅梅味酸性寒治一切瘟疫暑熱頭痛發熱服之神效務本卷一下桃桃各處俱有獨滇中生大黃桃及西竺種也食之輕身又有小金利核桃尖嘴桃活血金彈子主治血痢毛桃敷湯火傷實味辛酸治蠱積通月經潤大腸消心下積仁治血痰皮燒灰為末搽黃水瘡葉洗瘡除風大黃桃形似香櫞食之神清氣爽延年烏須務本卷一下桃子味甘酸性溫微毒能解邪氣美顏色多食動脾助熱令人膨脹發瘡癤服術不可食之又不可與鱉同食能發丹石毒食桃浴水令人瀉此物有損無益故五果列桃為下品桃仁味苦甘平無毒主治風痹骨蒸肝瘧寒熱破血殺蟲通潤大腸一治卒然心痛桃仁七枚去皮尖研爛和滾水服之即止桃葉熬水洗眼可除尸氣衝著範本卷九櫻桃櫻桃味甘酸性微寒治一切虛症能大補元氣滋潤皮膚久服延年益壽浸酒服之治左癱右瘓四肢不仁風濕腰腿疼痛採葉煎服治吐血梗燒灰為末治寒疼胃氣疼九種氣疼用燒酒下務本卷一下櫻桃味甘美性熱無毒採葉敷瘡最效主治和脾胃美顏色止泄瀉水穀痢疾多食令人作嘔發暗風動濕熱傷筋骨有寒火鬱熱及喘咳熱病者勿食食之必劇凡小兒勿多食多食生熱發疳積以小兒乃純陽之體服之熱症即生惟豆症色白陷頂不升漿者以核為末敷之可以升漿起長若陽症忌服又云核利於痘以根能升陽散火也範本卷九李子李子樹根李子味甘酸治風濕氣滯血凝葉治金瘡水腫不可多食傷損脾胃務本卷一下李子樹根味苦澀性寒治膏淋癃閉馬口疼痛秧草根為引點水酒服膿止管中作癢即愈附方管中癢如蟲行之狀用李子樹根三錢木賊三錢車前二錢地膚子一錢點水酒服叢本卷下赤陽子赤陽子一名救軍糧一名赤果一名純陽子一名火把果味甘酸治胸中痞塊食積消蟲明目瀉肝經之火止婦人崩漏皆效務本卷一下赤陽子生大川平野間墳園多以為牆今處處有之枝大有刺結細子色赤甚繁一名救軍糧一名火把果主治婦人産後百病淹纏或瘀血成塊血崩等症服之如神範本卷九郁李仁棠梨郁李仁一名樣藜又名唐藜棣梨俗名唐梨味酸甜性平潤大腸治四肢浮腫開通關格破血利水道皮治齒痛叢本卷中梨梨滇南處處皆有種類殊別皮有厚薄乳梨味香治中風消梨花梨桑梨治吐血棠梨潤肺止咳御兒梨治肝火目痛茅梨治胃寒蜜梨治小兒吼赤梨治大瘡敷患處雪梨治熱嗽止渴實味甘微酸梨者利也其性下行流利也切片治湯火傷處貼之如神亦能治中風不語寒症熱疾大小便不通或胃中痞塊食積霍亂吐瀉小兒偏墜疼痛即止但味甘不可多食取汁服之定喘止咳青梨治癆傷腰痛葉敷瘡皮敷發背疔瘡務本卷一下梨滇中有數種味甘酸平寒無毒麻梨治腹痛雪梨治吐血清水梨治小便不通雀梨治定喘化痰長蒂梨利小便及便中帶血桑梨治婦人虛症面梨補中寶珠寺內玉兒梨久服輕身延年化痰止咳生津止渴老梨主治瘧疾暑症範本卷九覆盆子覆盆子即硬枝黑瑣梅味甘酸性微寒入肝腎二經入腎興陽治痿軟入肝強筋種子方中決不可少叢本卷中覆盆子俗呼瑣梅又名鑽地風又名疏風草味甘酸分黃黑二種能鎖玉關故呼瑣梅得水氣而生入腎經益腎補肝明目興陽婦人多食能生子其功不可盡述根洗疥癩瘡務本卷一下鑽地風鑽地風即黃瑣梅根味酸性溫走經絡治筋骨疼痛痿軟麻木止日久赤白痢單方治赤白痢瑣梅根赤地榆煎服又方治白痢瑣梅根烏梅一個煎服單方治大腸下血日久可用瑣梅根槐寄生草等份煎服治之單劑點水酒吃效叢本卷中老虎刺尖老虎刺尖味苦性寒治咽喉腫痛乳蛾搗汁點水酒或同白酒汁服務本卷三酸餃酸餃味甘酸性平治酒化為痰隔於胃中同白糖煎膏早晚服一錢象最喜色務本卷一下落花參落花參味甘熱無毒鹽水煮食治肺癆生用水瀉炒用燥火行血治一切腹內冷積肚疼服之即效枝葉治跌打損傷敷傷處小兒不宜多食生蟲變為疳積忌之務本卷一上落花生味甘寒無毒主治補中益氣多則滯氣鹽水煮食養肺炒食動火小兒多食則生疳積採葉治毒瘡其效如神範本卷六金鵲花金鵲花一名大蛇葉味甜性溫主補氣補血勞傷氣血寒熱癆熱畏涼發熱咳嗽婦人白帶日久氣虛下陷者良效頭暈耳鳴腰膝痠疼一切虛勞傷損服之效此性不燥不寒用之良或煨筍雞豬肉食亦可叢本卷中響鈴草響鈴草味苦微酸性寒入肺斂肺氣止咳嗽消痰定喘單方治久咳嗽痰上帶血響鈴草蜜炒煎湯服效叢本卷中響鈴草生田野間軟枝緑葉葉下有一大果似豆莢形內有細子老黑色氣味辛酸苦主治石淋內結亦止咳嗽吐痰定喘降氣神奇搗爛敷瘡最良範本卷三白土瓜白土瓜味甘性平白者入肺經治肺熱消渴利小便治肺癰肺熱咳嗽通乳汁務本卷二苦參苦參味苦性大寒涼血解熱毒疥癩膿㾧瘡毒最良療皮膚瘙癢血風癬瘡頑皮白屑腸風下血便血消風消腫毒消痰毒補注苦參丸治疥癩瘡毒血風癬瘡風濕相搏遍身瘙癢腸風下血便血苦參四兩玄參一兩黃連五錢酒大黃一兩枳殼一兩防風一兩黃芩五錢梔子五錢菊花一兩共為細末蜜丸每服二錢滾水下叢本卷上槐槐角槐花槐七月採葉陰乾為末治一切大小便下血或痔瘡疼痛膿血不止燈草煎湯服採子服之止血散疽但性寒不可多食務本卷一下槐角槐花味苦性寒功多大腸經治五痔腸風下血赤白熱痢枝洗疥癩祛皮膚瘙癢之風叢本卷中柳楊柳花柳味苦性寒治一切五淋白濁血淋沙淋老幼服之神效務本卷一下水楊柳氣味苦辛主治血凝氣滯風寒外束小兒痘症有烏頭陷頂漿升不起者服此暖氣可以透達漿隨暖而行矣以此煎服或浴之即長此治小兒症仙方也範本卷十順水柳根氣味甘寒無毒主治一切五淋白濁大腸下血其效如神楊柳花味甘苦淡平專治吐血咯血咳血唾血下血血淋一切血症其效如神範本卷十栗子栗子花栗子味甘平治山嵐瘴氣瘧疾或水瀉不止或紅白痢疾用火煅為末每服三錢薑湯下生食胸中氣橫葉治喉疔火毒煎服神效皮敷打傷燒灰治癩瘡子上殼刺燒灰吹鼻中治中風不語吹之即醒或中痰邪亦吹即應務本卷一下栗子花味苦澀性微溫止日久赤白帶下休息痢疾止大腸下血栗子味甜性溫生吃止吐血衄血便血一切血症叢本卷中栗子味甘咸性溫無毒主治補中益氣厚腸胃補腎氣腰腳無力生則發氣熟則滯氣須日曝或灰中煨令汗出或以潤沙藏之或袋盛當風懸之並令去其水氣最良此果最益人其中扁者名栗楔尤好患風疾及水腫者不宜食小兒多食則難消化成病生嚼塗筋骨斷碎腫痛瘀血最效亦治反胃人口咬傷搗敷最良範本卷九波羅蜜波羅蜜樹高五六丈不花而實結於枝間有軟刺磊砢大有餘斤剝去外皮內肉層疊如橘食之香甜味甘香性平無毒止渴解酒不醉益氣令人悅澤核中仁煮炒食之補中益氣輕健不飢久服烏須黑髮延年固齒老人服之步履如少婦人服之生血和血退骨蒸之燒百病不生範本卷五桑白皮桑椹子桑白皮味辛微苦性寒金受火制惟桑白皮可以瀉之止肺熱咳嗽注云肺熱咳嗽要在寅午戌時乃真止喘促吼咳消肺痰咳血利小便消氣腫面浮肺氣上逆作喘開胃進食蓋氣降痰消則食進非脾氣虛弱附方治肺家實火肺受火克暑熱咳嗽發熱氣喘之症桑白皮一錢地骨皮一錢知母八分杏仁一錢去皮尖浙冬一錢陳皮一錢馬兜鈴一錢枯梗五分黃芩八分蘇子一錢引用竹茹三分水煎服務本卷二桑椹子味甘酸益腎臟而固精久服黑髮明目長壽丹方同覆盆子共搗成餅曬乾為末各四兩共八兩茯苓乳汁炙曬乾為末八兩山藥乳汁浸曬乾為末四兩共和一處煉蜜為丸每丸二錢清早服一丸開水送下此丸治男子精寒婦人血虛老年無子其功不小或欲火燒身已成癆症無不效應務本卷一下寄生草寄生草味苦甘性微溫生槐樹者主治大腸下血腸風便血痔漏生桑樹者治筋骨疼痛走筋絡風寒濕痹效生花椒樹者治脾胃寒冷嘔吐噁心翻胃又有用者解梅瘡毒婦人下元虛寒或崩漏叢本卷中拐棗拐棗一名天藤一名還陽藤味甘微溫無毒治一切左癱右瘓風濕麻木能解酒毒或泡酒服之亦能舒經絡久服輕身延年小兒服之化蟲養脾其效如神俗人不以此棗為然而又不知用處務本卷一上拐棗味甘平無毒主治補中益氣痰火閉結於胸中或酒毒結痛用此可解治遠年近日痰火濕氣流痰泡酒常服自可痊愈小兒有疳積者可常常食之範本卷九黑食子黑食子味甘酸滇南甚多秋季風吹子落呼為噓噓果食之元氣不散多睡能調心腎交接久服令人目清延年其功不可詳述務本卷一下赤小棗赤小棗味甘性平小而赤色有刺四月生葉五月開小白花七八月摘取肥大甘美治心腸邪氣安中養脾平胃通竅生津液久服輕身延年解一切百毒枝葉敷打傷神效務本卷一下康棗氣味甘酸性平主治補五臟清六腑解四時溫瘧暑症久服令人開胃健脾輕身延年採刺葉煎服可治厄症範本卷九葡萄葡萄色有絳緑二種緑者佳味甘性平服之輕身延年老人大補氣血舒經活絡泡酒服之治陰陽脫症又治盜汗虛症葉治火眼根治蛇頭瘡汁治咳嗽熬膏和蜜治腦漏百病每服一錢開水下又治小兒急慢驚風蘇葉湯下熬膏服方葡萄一斤蘋果六十個去皮大黃桃二十個去皮花紅果十個去皮共搗熬成膏入酒內埋土地二十一日取飲然須上好谷酒二十斤忌葷菜同食務本卷一下葡萄味甘酸性微溫無毒主治筋骨濕痹益氣為令人肥健治痘症毒其走下之性滲水道利小便胎氣上衝煎湯飲之即下不宜多食昔李太白釀酒常飲此可輕身耐老但服而有益者惟每日臨臥時飲三杯多則不效採葉貼無名腫毒最良範本卷九石葡萄石葡萄味甘無毒形似家葡萄亦非野間所有乃生於石上高尺余軟枝倒掛子如小烏飯果採食烏須黑髮之聖藥也治小兒痘瘡烏頭頂陷或爛痘蠱痘服之立效務本卷一上石葡萄生於石壁倒掛而成高僅一二尺亦如家葡萄而小如烏飯果樣採取服食烏須黑髮又治小兒痘瘡發痘助漿陷者能起爛者能平奇效異常通志卷六十七引滇南本草山葡萄山葡萄味甘酸性平無毒主治清火益氣消渴悅顏色不可多食範本卷十一石椒草石椒草味苦辣性溫有小毒走經絡治胸膈氣痛冷寒攻心胃氣疼痛腹脹發散瘡毒附方治冷寒胃氣疼痛石椒不拘多少根葉為末每服一錢五分熱燒酒服務本卷二香櫞葉香櫞香櫞葉刮上蜜火上炙用根功甚捷蜜炙味辛苦性寒治咳嗽消痰肺寒咳嗽良效叢本卷中香櫞氣味辛性溫無毒主治下氣除心頭痰水痰氣咳嗽煎湯治下氣痛按香櫞河南湖廣浙閩咸有之其實如橘柚而大至滇中則形鋭益大有尺許長者主治較佛手柑稍遜了本草但有佛手柑名香櫞本名枸櫞無此香櫞也豈此與佛手柑氣味相類而置此不論耶範本卷九佛手柑佛手柑味甘微辛性溫入肝胃二經補肝暖胃止嘔吐消胃家寒痰治胃氣疼止面寒疼和中行氣單方治面寒疼胃氣疼佛手柑新瓦焙為末黃色燒酒送下每服三錢叢本卷中佛手柑氣味辛甘平無毒治一切年久老痰結於胸中不散煎此久服可化痰清火延年範本卷九橘子皮橘子葉橘子皮味苦辛性溫行氣消痰降肝氣治咳嗽治疝氣等症附方治咳嗽橘子葉刮蜜在背上火焙乾煨吃又方治疝氣橘子葉十個荔枝核五個焙水煎服叢本卷下橙子理皮橙子味辛苦性溫入厥陰肝經陰也行厥陰滯塞之氣止肝氣左肋疼痛下氣消膨脹行陽明乳汁不附方治婦人乳結不通紅腫結硬疼痛惡寒發熱干橙子細末二錢有新鮮搗汁點水酒服叢本卷下理皮即黃果皮味辛苦性溫入脾肺肝三經主降氣寬中破老人痰結痰如膠者效化痰定喘止咳下氣功甚於廣陳皮補胃和中力不及廣陳皮昔李姓男子患積痰結核於咽喉中與梅核相似喉中有礙吐咯不出咽之不下似有似無有時阻滯補注按此症因肝氣不舒憂思氣鬱結成梅核偶著氣動怒即發李姓患此病十餘年用藥不效後得此方治好理皮二錢去白土白芍二錢蘇子二錢桔梗一錢竹葉二十個水煎服效叢本卷下苦楝子苦楝子一名金鈴子味苦性寒治膀胱疝氣根皮殺小兒寸白蟲雲南生者味苦辣有小毒務本卷三龍眼龍眼主治養血安神長智斂汗解蠱毒去五臟邪氣開胃益脾小兒未斷乳者忌食採殼為末作刀傷藥收口最速採葉曬乾為末敷搽小兒七星處出痘瘡時只出數點而又解胎毒又與小兒服葉七枚最良採核為末治癭疾可散範本卷九荔枝荔枝味甘微酸性溫無毒止煩渴美顏色通神健氣鮮者極甘美食之令人不厭雖多亦不傷人惟食之過飽魚湯尤良乾者經火焙過多食發虛熱動血令牙痛口疼火病人尤忌之一治厄逆不止荔枝七個連皮核燒存性為末白湯調下立止核用慢火燒存性為末酒服治心痛即小腸疝氣疼痛服一二錢亦愈食荔枝過度用蜜漿解之此蘇頌之說也本草綱目載之至魚湯尤良余未敢信或傳寫之誤耶余按閩中食荔枝過度有用其殼浸水飲者有以殼燒存性浸水飲者有醬油一杯飲者範本卷九皮哨子皮哨子味苦性微寒皮治膀胱疝氣疼痛子殼殺蟲昔一人飲水將螞蝗一條吸入鼻中頭常眩疼鼻中常流血水面黃形瘦後得一人傳此方以水一鍾於鼻上聞螞蝗見水從鼻孔中伸出動則縮入鼻中將皮哨子殼為末吹入鼻中螞蝗自落下務本卷三皮哨子味苦性微寒主治七疝肝症氣狐疝用茴香為使