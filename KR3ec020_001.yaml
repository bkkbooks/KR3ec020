body:
  text: 第一卷石蓮花石蓮花一名卷柏一名回陽草味苦性寒通月經破瘀血破癥瘕消血塊難産催生效燒酒為使叢本卷中石蓮花一名不死草生石崖上似側柏葉形氣味辛平主治五臟邪氣女子陰中寒熱痛癥瘕血閉結子久服輕身和顏色生用破血炙用止血範本卷四石蓮生又名側柏葉又名鳴鹿銜味辛苦性微溫主治筋骨痰火疼痛面寒疼痛腹痛婦人血虛勞熱消浮腫治筋骨痰火泡酒服治寒痛煎湯點酒服治勞熱煎湯點童便服治浮腫糠瓢檳榔煎服務本卷三木賊木賊一名節節草一名筆管草一名鬥眼草一名豆根草味辛微苦性微溫行十二經絡散肝家流結成翳治暴赤火眼珠脹痛退翳膜消胬肉遮睛兼治五淋玉莖疼痛小便赤白濁症根治婦人白帶淋瀝破血積通婦人經閉止大腸下血叢本卷上貫衆貫衆即蕨薇菜根味鹹澀性寒祛毒止血解水毒二三月間泡水盆中凡用去毛切片於火上白酒汁醮上焙乾附方治婦人白帶製法如前研末開水服又方治刀傷流血不止貫衆去毛發灰炒為末龍骨為末各等份共為細末搽患處能止血收口生肌務本卷二七星草七星草味甘性寒無毒此草形似雞腳上有黃點按星度而生或依根貼土上或石上生採服治沙淋血淋白濁冷淋又能包肚臍治陰症敷名瘡大毒如神務本卷一上石葦石葦味苦性寒入小腸經利小便通五淋止玉莖痛根消胸膈橫氣作脹退蒸熱凡用刮去毛若毛去不淨反令人咳嗽附方治手顫作搖服此即愈石葦根煎湯當茶水頻服務本卷二石葦氣味苦平毒去葉上毛用主治勞熱邪氣五癃閉不通利小便水道止煩下氣通膀胱治淋範本卷八白果白果味甘平性寒乃陰氣而生故夜間開花不可多食若食千枚其人必死採葉陰乾治小兒生火以菜油調搽皮面上風血或大瘡不出頭者白果肉同糯米蒸和蜜丸與核桃搗爛為膏服之治噎食反胃又治白濁冷淋又白果肉搗爛敷太陽穴止頭風眼疼用汁點喉內治咽喉十八症採果搗爛敷無名腫毒不能出頭者務本卷一下白果味甘苦性溫有小毒生食引疳熱食溫肺定咳嗽縮小便多食壅氣發脹而動風小兒多食昏迷發驚引疳積蟲出同魚腥食發軟延壽經云白果食滿一千則死昔有凶年飢者以白果同飯食飽次日則死採葉搗爛搽雀斑甚妙採樹皮燒灰調油搽牛皮銅錢癬最效範本卷九松節松筆頭松香地盤松球松節味酸性平行經絡治痰火筋骨疼痛濕痹痿軟強筋舒骨叢本卷中松筆頭松樹蕊味苦微澀性微寒行經絡止莖中痛止便濁治膏淋疼痛不可忍者磨水酒服之效五淋俱可服叢本卷中松香一名松脂味苦甘性溫搽疥癩瘡吃安五臟除胃中濕熱療赤白癜風癘風等症一人得癘風皮膚瘙癢鬚眉脫落面身俱起紫泡一人傳以此方效用白松香不拘多少於砂鍋內煎九次每煎一次露一宿俟九次完方可用如砂者良服此藥終身不發忌鹽吃鹽即發叢本卷中地盤松球味苦性溫性走足太陽經治疝氣偏墜即覓小青松盤地生者上結小球有鈕子大取緑嫩者不拘多少愈多則愈美能升陽消氣水煨點水酒服連球更好採子敷瘡亦效務本卷三側柏葉側柏葉俗名扁柏味辛微酸苦性寒搗汁治吐血鼻衄血嘔血小便尿血婦人暴崩下血並皆治之叢本卷中玉蘭花玉蘭花一名辛夷味辛微苦性溫治腦漏鼻淵祛風新瓦焙為末治面寒疼胃氣疼引點熱燒酒服叢本卷中野棉花野棉花味苦性寒有毒下氣殺蟲小兒寸白蟲蛔蟲犯胃用良叢本卷中野棉花一名滿天星形似耳風小葉白毛花味苦性寒有毒下氣治小兒寸白蟲蛔蟲犯胃疳積等症隨引經藥為使範本卷五云連云連即雲南黃連一名滇連蚱䗫連味苦性寒入心經兼入肝膽脾大腸經清火除濕消痞塊止痢疾清肝膽火用吳茱萸拌炒清上焦火宜酒炒清中焦火薑汁炒清下焦火鹽水炒氣虛心血不足虛弱症忌服於本卷下滇連一名云連人多不識生𨹤山形似車前小細子黃色根連結成條此黃連功勝川連百倍氣味苦寒無毒主治熱氣目痛背寒傷泣出明目腸澼腹痛下痢婦人陰中腫痛久服令人不忘治五臟冷熱久下泄澼膿血消渴止心腹疼痛除水利骨調胃厚腸益膽療口瘡治五勞七傷益氣除煩燥潤心肺長肉止血天行熱疾羸瘦氣急一治鬱熱在中煩燥在心兀兀欲吐心下痞滿主心痛逆而盛心積伏梁範本卷四白芍赤芍白芍味酸微甘性微寒主瀉脾熱止腹痛止水泄收肝氣逆痛調養心肝脾經血舒肝降氣止肝氣痛白芍湯治肝氣疼痛偶因動怒著氣怯寒怕冷左肋氣脹上攻胸膈或連胃口疼痛背寒腰脊把著疼痛身體屈伸俱難白芍三錢青皮五分川芎一錢片柴胡一錢吳茱萸一錢甘草八分外加木香沉香玄胡不拘多少引茴香子八分煎服叢本卷上赤芍味酸微辛性寒泄脾火降氣行血破瘀血散血塊止腹痛散血熱攻癰疽治疥癩瘡叢本卷上牡丹皮牡丹皮味酸辛性寒破血行血消癥瘕破血塊除血分之熱墜胎孕婦忌服叢本卷上雞頭實雞頭實始生外國今滇中亦有之生水中葉大如荷錢而有刺俗名謂之雞頭盤葉下結實形類雞頭莊子謂之雞雍管子謂之卯菱其莖𦵸之嫩者名蒍𦵸人多以為菜食氣味甘平澀無毒仁主治濕痹腰脊膝痛補中除暴疾益精神強志令人耳目清明開胃助氣止渴益腎治小便不禁遺精白濁帶下䓈菜雞頭莖也氣味鹹甘無毒主治止渴除虛熱生熟皆宜根氣味同莖主治小腸結氣疼痛亦治追心疝葉主治寒症漏底水瀉氣欲脫服之立瘥範本卷九荷葉藕荷葉白蓮花葉入氣紅蓮花葉入血味辛平性微溫入肝肺二經升也陽也上清頭目之風熱止眩暈發暈清上焦之虛火可升可降清痰泄氣止嘔頭悶疼附方治頭眩悶疼白蓮花葉二錢水煎入冰糖五分服之良效務本卷三藕味甘平多服潤腸肺生津液痰中帶血立效節治婦人血崩冷濁葉止血虛火暈花治婦人血逆昏迷子清心解熱之聖藥也久服輕身延年務本卷一下藕氣味甘寒無毒開胃健脾生食令人冷中熟食補五臟産婦忌生冷惟藕不忌藕節止咳血唾血血淋蓮葉治産後衣不下一切心慌頭暈蓮鬚澀精固腎氣蓮子開胃健脾養心安神範本卷九土黃連土黃連一名石妹刺味苦性大寒瀉小腸經實火胃中實熱利小便止熱淋痛牙根腫痛咽喉疼痛小兒乳蛾痄腮單方土黃連為末泡人乳點暴赤火眼腫脹疼痛效叢本卷中淫羊藿淫羊藿味微辛性微溫入肝腎二經興陽治痿強筋骨用剪剪去邊上刺羊油拌炒務本卷三興陽草生山中月白緑葉上有粉霜邊上有刺根類陽物味辛性溫入足少陰足厥陰二經主治凡陽事不舉痿縮不升久無子嗣者服之可以興陽治痿其應如響採草去刺為末如桐子大每服三錢可以復有子嗣範本卷六地不容地不容味苦性溫有毒治一切瘧疾吐痰倒食氣虛者禁忌吐痰甚於常山恐傷人命常山吐痰有轉達之能地不容無轉達之能故爾忌用叢本卷中地不榮軟枝細藤葉似小荷錢根大而肥味苦辛性溫有小毒主治瘧疾吐痰倒食氣血虛弱之人忌用此藥只可敷瘡不可妄服專治一切癰疽疔毒發背無名腫毒不出頭者用雞蛋清調搽留頂一夜即出頭出頭後切勿妄敷熱毒只採葉貼患處即愈若服即中其毒慎之範本卷五魚腥草魚腥草味苦辛性寒平治肺癰咳嗽成癆帶膿血者痰有腥臭亦治大腸熱毒療痔瘡五痔皆痊附方治肺癰吐膿吐血魚腥草天花粉側柏葉等份煎湯服之即愈又方治痔瘡不論內外魚腥草煎湯點水酒服連進三服其渣薰洗患處有膿者潰無膿者自消務本卷二罌粟殼罌粟罌粟殼味甘澀性寒主治收斂肺氣止咳嗽止大腸下血止日久瀉痢赤白等症初起痢疾或咳嗽忌用叢本卷中罌粟阿芙蓉即罌粟花也治瀉痢脫肛不止能澀氣味酸澀殼寒無毒主治止瀉痢及脫肛治遺精久咳斂肺澀腸止心腹筋骨諸痛範本卷三五味草五味草一名金鉤如意草味有五故名五味性微寒祛風明目退翳消散一切風熱肺勞咳嗽發熱肝熱勞燒怕冷走筋絡治筋骨疼痰火等症單方治眼目生玉翳或生霧翳青盲五味草二錢穀精草一錢木賊草五分青葙子五分共和一處煎湯服叢本卷中地草果地草果味辛酸性微寒入肝經走陽明破血破氣舒肝家鬱結之氣風火眼暴赤疼痛祛風退翳膜遮睛蓋肝氣結而翳成散肝氣而云翳自退但肝實者可用肝虛者忌之治婦人奶乳閉結不通腫脹硬疼紅腫成癰並皆治之地草果開白花緑花治眼科良開紫花者治奶結疼效開黃花者治寒氣肚疼效奇方治婦人乳結不通或小兒吹著或自身壓著乳汁不通見症若頭疼怕冷發熱口乾身體發困乳頭乳旁紅腫脹硬咬疼如針刺古方單劑治乳汁不通疼痛今加增治之良效地草果二錢川芎錢半青皮五分北柴胡一錢白芷一錢天花粉一錢金銀花一錢甘草節五分引點水酒服補注乳頭厥陰肝經所屬乳旁陽明胃經所屬乳母不知調養忿怒鬱結故厥陰之氣不行陽明之乳不升以致有乳房紅腫疼痛之症是方地草果青皮川芎柴胡行肝經郁逆之氣白芷花粉升陽明之乳汁甘草和中暖肝銀花消紅腫熱毒乳汁自然流通或潰或散因症調治而愈增補治目疾暴赤火眼風熱腫痛羞明怕亮翳膜遮睛地草果一錢川芎一錢白蒺藜一錢去刺搗汁廣木賊五分穀精草一錢白菊一錢黃芩一錢梔子一錢蟬蛻一錢去頭足引點羊肝一片煎服叢本卷上瓦松瓦松又名佛指甲味甘微辛性微寒治咽喉腫痛消乳蛾行經絡風寒濕痹筋骨痠痛洗瘡濕熱毒附方治咽喉腫乳蛾疼痛新鮮瓦松不拘多少搗爛加清水攪濁後澄清去渣不用能用酒者點酒服不飲酒者點醋服務本卷三瓦松入足少陰咽疼喉疼單雙乳蛾採根入足陰治筋骨疼風濕可散採搗敷囟門止鼻衄不止包打傷亦良範本卷三瓦草瓦草一名白前味苦辛性寒開通關竅清肺熱利小便治熱淋叢本卷中金鐵鎖金鐵鎖味辛辣性大溫有小毒吃之令人多吐專治面寒疼胃氣心氣疼攻瘡癰排膿為末每服五分燒酒服叢本卷中珍珠草珍珠草味辛性溫治面寒疼新瓦焙乾為末熱燒酒服叢本卷中千針萬線草千針萬線草味甘性微溫補肝脾腎陰血虛弱神氣短少頭暈耳鳴心慌目中起翳生花五心煩熱午後怕冷夜間發熱小肚脹墜腰疼腳痠步行艱難婦人白帶漏下淋瀝等症調養精神補養腎肝任督二脈虧損婦人虛弱要藥單方婦人白帶日久頭暈耳鳴腰疼夜間發熱精神短少飲食無味治效千針萬線草三錢水牛肉三五兩煨吃三四次效叢本卷中千針萬線草形軟枝碎葉根似菊花參之根一撮肥而白又似百部一條一條氣味甘平無毒主治補肝健脾養腎生血和血退五熱降火止耳鳴心神不寧能升能降婦人最良採服止咳血良效範本卷三萹蓄萹蓄味苦性寒利小便治五淋白濁熱淋瘀精澀閉關竅並治婦人鬱氣胃中濕熱成白帶之症萹蓄大薊水煨點水酒服又方治男婦童癆虛熱子午發熱日久發熱不退或産後發熱不退萹蓄五錢煎點水酒童便服務本卷二何首烏何首烏味微甘性微溫古本草注云久服延年耐寒且味澀苦入腎為君澀精堅腎氣止赤白便濁縮小便入血分消痰毒治赤白癜風瘡疥頑癬皮膚瘙癢截瘧治痰瘧附方治赤白癜風何首烏苦參等份酒洗共為細末用皂角水泡竹刀披開取濃汁為丸又方治痰瘧何首烏黑豆煎露一宿次早煨熱服效又方治寒熱往來虛瘧法半夏一錢白茯苓三錢何首烏一錢炙生薑一片水煎露一宿次早煨熱服此方治瘧以七天後可用中氣虛者良效若初病風邪未消痰火不清飲食不消忌用務本卷三草血竭草血竭一名回頭草味苦辛微澀性