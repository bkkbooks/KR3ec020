嗽殺蟲務本卷二百合花百合花味甘平微苦性微寒入肺止咳嗽利小便安神寧心定志味甘者清肺氣易於消散味酸者斂肺有風邪者忌用附方治老弱虛暈有痰有火頭目眩暈百合花三朵皂角子七個微焙或蜜或沙糖同煎服務本卷二芋頭芋頭味甘麻治中氣不足久服補肝腎添精益髓又能橫氣務本卷一下浮萍草浮萍草味苦性寒發汗解毒治疥癩瘡癬祛皮膚瘙癢之風務本卷下伏平草或即浮萍味苦性寒利膀胱積熱洗皮膚之風療婦人諸經客熱清胎熱婦人濕熱帶下用之效叢本卷中水萍氣味辛性寒無毒主治暴熱身癢下水氣解表之藥醫水腫最效水毒能解範本卷八山韭菜山韭菜一名長生草一名不死草一名野韭菜一名野麥冬一名書帶草生山中形似家韭其葉稍大味甘作菜食能養血健脾強筋骨增氣力連根搗汁治跌打損傷敷患處可散瘀血而止疼痛根同赤石脂搗爛曬乾為末擦刀斧傷生肌長肉神效此刀傷之聖藥也四時常青不畏霜雪不開花不落葉作盆景佳務本卷一下蔥白蔥白味辛性溫入手太陰經入足陽明經引諸藥遊於四經專主發散以通上下陰陽之氣傷寒頭疼用之良效傷寒頭疼用蔥姜拌醬生吃效少陰下利清穀氣表熱裡寒古人白通湯主之亦有蔥白之名忌同蜜吃吃之令腹疼嘔吐多吃昏神致傷性命切忌相犯務本卷三蔥氣味辛葉性溫根鬚平無毒主治利五臟達表和里通關節利二便散風濕麻痹腳氣安胎最良亦能治跌打損傷範本卷八韭菜韭菜子韭菜味辛咸性溫溫中下氣補虛益陽補腎興陽泄精除噎散結主治吐血衄血尿血生搗汁服除胃脘瘀血熟吃滑潤腸胃中積或食金銀銅鐵錫器於腹內吃之立下昔一婦人誤吞金手圈一個於肚內得此方服之金手圈從大便中韭菜裹之同糞而出韭菜不拘多少勿切滾水炸熟芝麻油拌服一小兒誤吞銅錢入腹此方立效韭菜子焙黃去白皮味辛咸性溫補腎肝暖腰膝興陽道治陽痿種玉方中不可無婦人多食生白淫白帶按韭菜多食動痰動邪火興陽泄精婦人多吃生白帶同牛肉食令人生嘈雜病昏神昏眼目務本卷三韭菜氣味辛微酸性溫無毒主治解肉脯毒歸心和臟腑下氣散血利水除胸腹冷痛多食昏神損目酒後勿食春食宜人夏食臭冬食動宿疾近根白者溫中下氣益陽止泄範本卷八大蒜青蒜大蒜味辛性溫有小毒祛寒痰久吃生痰動火興陽道泄精少用健脾胃消穀食化肉食解水毒按大蒜胃中有痰積食之令人肚腹疼嘔吐氣脹有胃氣疼者忌食食之發胃氣疼咳嗽忌食有背寒面寒者忌食久食令人昏神昏眼目動肝氣多食傷脾務本卷三青蒜味辛性溫醒脾氣消肉積消穀食動痰動氣膨脹解百毒敷瘡神效按青蒜多吃令人胃中痰動心胃嘈雜傷肝昏眼目咳嗽忌食務本卷三青蒜氣味辛溫有小毒主治解蠱毒闢疫惡瘴氣蛇毒亦療轉筋腹痛虛人服者反生痰多食昏神範本卷八射干射干又名烏扇味苦辛性微寒有小毒治咽喉腫痛咽閉喉風乳蛾痄腮紅腫牙根腫爛療咽喉熱毒攻散瘡癰一切熱毒等症附方治咽喉等症射干二錢桔梗二錢甘草一錢連翹一錢牛蒡一錢梔子一錢炒黃芩一錢元參一錢山豆根一錢防風五分薄荷五分水煎服若肺熱加石膏胃熱大便結加大黃芒硝血熱加生地赤芍防風各一錢煨服又附吹喉散治乳蛾痄腮咽喉疼痛喉風痰塞等症立效射干五錢山豆根三錢硼砂五錢枯白礬二錢冰片五分雄黃一錢以上六味共為細末吹喉一日即消散務本卷三白藥子白藥子味微苦性平入脾肺腎三經主治補中益氣斂肺氣興陽道治陽痿止虛勞咳嗽傷風日久咳嗽良效並治婦人白帶附白藥湯治婦人白帶白藥子三錢艾葉二錢香附一錢伏龍肝二錢棉花子三錢芡實一錢醋炒白果五個煎服務本卷三黃藥子黃藥子味苦性大寒不可入藥醫馬之良藥也務本卷三棕樹根棕子棕樹根味苦澀性寒治婦人血崩不止男子五淋便濁又治大腸下血單方治膏淋七八日後棕樹根單劑不拘多少煎點水酒服立效叢本卷中棕子味苦澀平性溫主治婦人白帶筋骨疼痛半身不遂五淋白濁服之最良範本卷十一仙茅仙茅味辛微咸性溫入腎肝二經治老人失溺補腎興陽道暖腰膝又治婦人紅崩下血攻癰疽排膿附方治婦人紅崩下血以成漏症仙茅三錢為末全秦歸蛇果草各等份以後二味煎湯點水酒將仙茅末送下補注崩症日久任督二脈虧損脾氣虛而中氣下陷腎氣虛而不能納血猶已損之瓶盛水必浸故有漏症之說此方秦歸養陰血仙茅補任督而強陽道則腎氣足而無漏症矣更取蛇果草之就下以澀血又方治癰疽結毒毒漫無頭色青黑者仙茅不拘多少連根鬚煎點水酒服或以新鮮者搗爛敷之有膿者潰無膿者消務本卷二獨葉一枝花獨葉一枝花上有花根有二子服者延年輕身味甘辛無毒主治一切諸虛百損五勞七傷腰疼腿痛其效如神取根二子用麥麵包好入火內燒一時為末救瘟疫取花為末擦各種毒瘡即愈生肌長肉此草同地草果搗爛曬乾為末和丸每服一錢以扁柏葉一錢同服之烏須黑髮單服地草果治胃氣疼務本卷一上秧草根秧草根味甘澀性微寒入肝脾二經涼血止血治大腸下血婦人紅崩白帶散經連綿利小便治五淋白濁消血腫附方治婦人紅崩下血散經連綿日久不止秧草根二錢管仲一錢水煨點水酒服務本卷二荸薺荸薺味甘治腹中熱痰大腸下血又能化銅務本卷一下韭葉藝香草韭葉藝香草味辛微苦性微寒治山嵐瘴氣不服水土有感冒風寒暑濕或冒四時不正之氣頭疼發熱乍寒乍熱體困痠軟寒熱往來似瘧非瘧或發瘴瘧胸膈膨脹飲食無味肚腹疼痛嘔吐水瀉等症逢水毒可解此草上有白毛者真若無者非是須辨之附方治傷暑霍亂嘔吐水瀉肚腹疼痛頭疼發熱怕寒或中煙瘴不服水土韭葉藝香草一錢木瓜五分蒼朮一錢陳皮一錢厚朴一錢甘草五分生薑一片水煎服忌油葷單方治四時感冒風寒暑濕頭疼體困乍寒乍熱煩渴飲水發熱不涼者汗解而愈韭葉云香草三錢水煎服補注昔武侯入滇得此草以治煙瘴此草生永昌普洱順寧茶山地方形如蘭花但葉有細白毛且如韭葉但韭葉則軟藝香草硬務本卷二鐵線草鐵線草生田邊曠野間軟枝串地延蔓而生稈細而赤恰似鐵線故名鐵線草味甘微苦澀性平入肝筋骨疼行經絡半身不遂手足痙攣痰火痿軟筋骨痠疼泡酒用之良效搗爛敷瘡可愈附方治筋骨疼痛鐵線草小白淑氣花曬乾秦歸牛膝桂枝共入罐內泡酒文武火煮一炷香埋土內一夜去火次日取出臨臥服三杯又方鐵線草用口嚼敷久遠臁瘡生肌又刀傷跌打損傷止血收口能接骨良效補注鐵線草要穿過路去或石頭縫內直長順石直遍過石頭去更好務本卷三稗米稗米味辛甘苦性微寒無毒宜脾益氣亦堪作飯能殺蟲煮汁沃地螻蟻皆死忌之範本卷五大麥芽大麥芽味平甜性溫寬中下氣止嘔吐消宿食止吞酸吐酸止瀉消胃寬膈並治婦人奶乳不收乳汁不止附方大麥芽不拘多少煎湯服務本卷二茅根茅根味甘性寒入胃小腸二經祛瘀血通血閉止吐血衄血治血淋利小便止婦人崩漏下血務本卷二粳粟米稻草粳粟米亦呼為稻米治一切諸虛百損補中益氣強筋壯骨生津明目長智梗燒灰治走馬牙疳糯者補中和胃止瀉生津液主人面容嬌嫩敷瘡亦治頽頭瘡神效務本卷一上秈米音仙即黏米似粳而粒小滇中有赤白二種味甘性溫無毒主治溫中益氣養胃和脾除濕止瀉普濟方云舊禾主治反胃燒灰淋汁和粥溫服甚效蓋胃中有蟲能殺之久服可以益壽今閩中多服此米範本卷五稻草味甘平性溫無毒主治寬中寬腸胃下氣溫中止瀉消牛馬肉積宿食消小兒乳食結滯肚腹疼痛草節走周身經絡治筋骨痰火疼痛附方一人食牛馬肉傷食胸口嘈雜嘔吐噁心胸口脹滿微痛不思飲食麵皮黃瘦腹飢倒飽食後梗食膨脹稻草五錢沙糖一錢水煎服三次效又方治小兒飲食傷脾久瀉不止諸藥不效得此方效或桃李梨果傷脾作瀉亦治糯穀草三錢砂仁五分煎服久瀉加真淮藥二錢又方治腿足筋骨疼痛痰火發作得此方痊愈稻草節三錢剪三分長或服一百節或服五十節水煎服奇效痛止痰火濕腳氣加薏苡仁三錢務本卷二稷米稷米味甘性寒無毒脾之谷壓石毒丹毒可解和胃益脾涼血解暑多食令人發冷氣同瓠子食尤甚飲黍汁即瘥範本卷五野粟野粟似田中之粟不異高尺余主治補中益氣五勞虛燒神效婦人乾血勞服之亦效範本卷四粟米粟米味鹹微寒主滋陰養腎氣健脾胃暖中反胃服之如神治小兒肝蟲或霍亂吐瀉肚疼變痢疾或水瀉不止服之即效用草連根治轉食冷吐務本卷一上青粱米味甘性微寒無毒主治補中益氣治胃痹熱中消渴止瀉痢滑精久食可辟穀長年範本卷五黃粱米氣味甘性微寒無毒和中止霍亂瀉痢除熱煩利小便祛風解表久服延年範本卷五秫米秫米音術味甘性寒無毒肺之谷利大腸治漆瘡患瘧日夜寒熱不得眠者宜用久食動風小兒勿多食範本卷五蘆粟氣味甘澀性溫無毒主治溫中澀腸胃止霍亂黏米者與黍米同功根煮汁利小便止喘嗽中滿立瘥治婦人橫生倒産衣包不下燒灰研細末酒送下即順産也範本卷五玉麥須玉蜀黍玉麥須味甜性微溫入陽明胃經寬腸下氣治婦人乳結紅腫或小兒吹著或睡臥壓著乳汁不通紅腫疼痛怕冷發熱頭痛體困新鮮焙乾為末不拘多少引點酒服其功神速未可視為棄物而忽之也叢本卷中玉蜀黍氣味甘平無毒主治調胃和中祛濕散火清熱所以今多用此造酒最良範本卷五茭瓜茭瓜味甘平治腹內冷痛小便出血效務本卷一下神麯神麯味甘性平寬中扶脾胃以進飲食消隔宿停留胃內之食止瀉氣虛者能令出汗附方治大人小兒泄瀉肚腹疼痛或大瀉不止神麯二錢炒麥芽二錢炒杏仁一錢五分去皮尖引用真菜油一二茶匙先入罐底後放藥在內入水煨服務本卷二小仙草小仙草味辛苦性微溫發散瘡癰走經絡痰火筋骨疼痛手足痿軟除風濕寒熱煎點水酒服務本卷二水芭蕉水芭蕉務本附圖生水內短小無花形似山芭蕉此蕉只高尺余所以不同有大毒採為末若逢刀剮傷毒破瘡或遇蛇咬蠍毒敷上即愈或中見血封喉之毒箭剮患處先用此藥搽上用刀剮之不疼此乃麻藥之神也務本卷一上雙尾草雙尾草務本附圖分雙尾以此得名味甘辛無毒治一切大麻風癩疾諸毒瘡無名腫毒癰疽發背服之如神取雙尾草一斤熬成膏服之烏須黑髮兼治一切陰虛火盛婦人乾血勞症小兒虛勞先天不足取根煮酒治一切痰火腳氣手痿軟或中風不語半身不遂早午晚飲三杯神效取葉摻銅器如銀其葉解諸毒藥務本卷一上石梅石梅務本附圖生石上此草非山梅亦非家梅也山梅樹大石梅樹小僅高數寸至尺余葉黃色梗硬黑色子甚細小味酸無毒採葉為末每服三錢用苦連翹湯下治一切大瘡毒大麻風諸般癩疾神效採子食之治九種氣疼採花止血敷傷處皆效務本卷一上芝麻菜芝麻菜味甘平性微寒治中風中寒並暑熱之症務本卷一下地精草地精草務本附圖此草生於山中形似板枝枝上有飛藤纏繞葉緑色紫梗五月開小白花在枝上味辣有毒用火炙過方可用採取陰乾為末治頭風傷目中風不語口眼歪斜傷寒發熱服之神效又有一種石出之地元藤與此形相似而地元藤有大毒毒人但見開黃花者切不可採用開白花者務本卷一上羊奶地丁羊奶地丁味苦性微寒入肝經退熱治寒熱往來子午潮熱發散風寒解汗附方治男婦虛勞發熱忽寒忽熱羊奶地丁五錢水煨點水酒童便服務本卷二如意草如意草務本附圖此草生於𨹤山形似小芭蕉四葉無花根似人形味甘苦性寒治一切虛症以此草酒浸名坎離酒服之輕身耐老務本卷一上樓臺草樓臺草務本附圖此草生𨹤山中形似艾葉軟枝獨苗味酸甘性熱無毒主治一切筋骨痿軟脫陽脫陰夜多盜汗婦人血崩即效又治跌打損傷接骨如神取葉燒灰治一切小兒黑痘及頂陷服之神效梗治絞腸痧肚疼或陰症研末酒服三錢如神效務本卷一上
