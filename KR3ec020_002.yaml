body:
  text: 第二卷鳳尾草鳳尾草生山中有水處軟梗此草與晴明草相似然掃天晴明草硬梗味辛無毒採枝葉用忌犯鐵器主治跌打損傷筋斷骨碎敷患處又治脫肛敷囟門即入隨後換藥神效此草又能潰人大瘡務本卷一上鳳尾草形似茴香年多者有紅稈細緑葉主治跌打損傷散血定痛範本卷五過山龍穿山藤過山龍味苦辣性微寒有小毒降也下氣消胸中痞滿橫膈之氣推胃中隔宿之食去年久腹中之堅積消水腫其性走而不守其用沉而不浮得檳榔良此草藥中之虎將也用宜慎之附方治傷食成瘧用之截食瘧過山龍三分廣檳榔一錢蓮子五分如象吃檳榔蘆子一樣亦用石灰又方治消水腫氣實者用虛者忌過山龍五分細末糠瓢一錢五分火煅存性檳榔一錢用檳榔糠瓢煨湯吃過山龍末以瀉為度務本卷三穿山藤生山中藤長丈餘上有毛刺緑色根老方可採取味苦辛性寒有小毒降也主治下氣消腹中痞積推胃中之宿食年久腹中堅積消水腫血腫亦治筋骨疼痛四肢不仁採根曬乾為末治五積六聚胸中血積成塊俗名血鼠燒酒送下加檳榔雷丸共為末使君子湯送下消寸白蟲成團下之熬水洗風癩疔瘡立愈範本卷五過江龍過江龍發散表汗手足濕痹不仁麻木濕氣流痰筋骨疼痛或打傷筋骨誤傷經絡用力勞傷筋骨疼痛能強筋舒筋活絡定痛發散風寒濕氣膀背疼痛背寒困痛附方過江龍泡酒治膀背疼痛手足麻木不仁周身經絡疼痛或用力過多周身疼痛發困腳腿轉筋寒濕傷筋經絡作脹痠疼此酒舒筋活絡定痛神效過江龍五兩去葉八仙草二兩牛膝五錢全當歸三兩真穀子酒十斤將藥入罐內罐口扎緊無令泄氣於鍋內重湯煎一炷香為度取出露一夜去火毒臨用將酒燉熱隨量服務本卷三掃天晴明草又名鳳凰尾一名鳳凰草又名鋪地虎舒筋草味甘酸苦性熱無毒此草形似茴香其葉細小主治一切跌打損傷筋骨打斷敷之即愈其效如神做刀傷藥敷大毒瘡痢疾血淋服之神效又治婦人血鼠治五淋白濁治大腸下血治血淋疼痛治婦人血崩務本卷一上蕨菜蕨菜味甘滑性冷主治去暴熱利水兼令氣下降範本卷八山胡椒山胡椒味苦辛性溫入脾腎二經治面寒疼痛暖腰腎而興陽道治陽痿泡酒服並解汞毒消瘰癧結核山胡椒秦歸泡服三月見效叢本卷中山胡椒氣味辛大溫無毒主治下氣溫中去瘀除臟腑中風冷去胃口虛冷氣亦除寒濕霍亂吐瀉轉筋服之最良範本卷八虎掌草虎掌草味苦辣性寒有小毒行經絡攻熱毒攻胃中痰毒胃有痰毒飲食嘔吐消疽癤諸瘡紅腫血風疥癩癬瘡治瘰癧核瘡結核痰核氣瘰或有潰爛痰入經絡紅腫疼痛走注痰火症外乳蛾痄腮腫疼內乳蛾咽喉腫疼牙根腫疼奇方名五虎湯治痰咳結氣瘰核腫硬如桃李未破繞項生者虎掌草二兩小九牯牛一兩紫夏枯草一兩白頭翁一兩威靈仙五錢好酒斤泡每晚上燉熱服三杯二十一日痊愈核自消散氣實者可用氣虛者禁忌增補附方治同前症貝母香附川芎連翹牛膝牛蒡子夏枯草防風各等份引點水酒服氣虛者佐以四君子湯血虛四物湯根煎湯點酒截瘧神效叢本卷上虎掌草形似天南星昔東山老人在滇滇萬民個個染瘟疫身上忽起一疔紅線線穿心則亡速用此敷之神效若紅疔破內有一白刺似毛形用針挑去周圍用此藥搽之可救萬民滇中火地多染此症範本卷三升麻升麻味苦平性寒升也陰中之陽也引諸藥遊行四經發表傷寒無汗發表小兒痘疹要藥解諸毒瘡疽止陽明齒痛祛諸風熱補注升麻湯治小兒痘痧疹不明發熱頭痛傷風咳嗽乳蛾痄腮升麻五分前胡八分甘葛五分黃芩一錢梔子八分炒牛蒡子一錢甘草三分桔梗五分薄荷五分川芎一錢引用燈芯一束煎服咳嗽加桑皮陳皮杏仁喘加蘇子川貝母補注治小兒痧疹發表後發熱咳嗽痧疹內收痰喘氣湊咽喉疼痛咳嗽音啞肺熱等症前胡一錢升麻三分茯苓一錢連翹一錢防風五分桔梗八分薄荷五分淡竹葉一錢水煎服務本卷三木通風藤草木通一名風藤草根味淡平性平瀉小腸經實熱即效清利水道功效最良能消水腫通利五淋白濁小便癃閉玉關並治暴發火眼疼痛等症附方治火眼疼痛風藤草尖不拘多少用潮紙包定於子母火內微炮擠汁點目內要將灰去淨又方治尿結小兒尿結更良風藤草尖用新鮮者不拘多少搗汁去渣點水酒服之良效務本卷三風藤草氣味甘苦性平主治一切風癢筋骨疼痛補血和血散血疏風散熱一切瘡疥煎湯浴之最良搗葉散瘡毒之腫痛範本卷十瞥藍瞥藍味辛澀治脾虛火盛中膈存痰腹內冷疼又治小便淋濁又治大麻風疥癩之疾服之立效生食止渴化痰煎服治大腸下血燒灰為末治腦漏鼻疳吹鼻治中風不語葉可敷惡瘡皮治淋症最效務本卷一下掰藍味甘辛性冷主治寬中利膈解酒多損氣患惡瘡者忌食範本卷八白菜白菜一名菘菜味甘性平主消痰利小便止咳嗽清肺熱叢本卷下白菜本草謂之白菘味甘性涼無毒去魚腥和中消食解酒利腸胃多食髮膚癢胃寒有足疾者勿食如多食傷者姜能解之範本卷八青菜青菜一名苦菜味苦性大寒解五經之邪熱涼血熱寒脾胃發肚腹中諸積利小便不可多用附方治婦人乳結紅腫疼痛紫苦菜搗汁水煎點水酒服務本卷三芥菜芥菜味辛性溫利九竅而開胃化痰範本卷八黃芽白菜黃芽白菜味甘微酸性微寒走經絡動痰火利小便務本卷三薺菜薺菜味微辛苦性平清肺熱消痰止咳嗽除小腸經邪熱利小便單方治肺熱咳嗽用雞蛋煮吃叢本卷下蘿蔔萊蔔子白紅蘿蔔稈葉蘿蔔即萊蔔生味辛熟味甘性溫入脾肺二經寬中下氣消宿食解香油毒治麥面積熟吃之醒脾氣化痰涎解酒消食利五臟而補中生吃破血寬腸動痰逆氣上升咳嗽忌用叢本卷下萊蔔子即蘿蔔子味辛性溫入脾肺二經下氣寬中消膨脹消痰涎消宿食消面積滯降痰定吼喘攻腸胃積滯治痞塊治單腹疼附萊蔔丹專治男婦單腹脹形如鑼鍋腫硬脹滿小兒肚大筋青神效萊蔔子五錢白豆蔻仁去殼五錢牙皂二錢五分吳神麯五錢巴豆殼五錢過山龍五錢酒炒草血竭一兩五錢川鬱金五錢檳榔五錢木香二錢沉香三錢面目浮腫足腫加土狗一兩去足翅共為細末水疊為丸或為末亦可滾水服二錢服至二十一日後痊愈此丹專治諸氣不調鬱結不升上焦閉塞脾胃不和飲食停滯不化氣逆不舒胸膈脹滿嘔吐噁心心腹膨脹吞酸吐酸飽悶打厄心脾氣疼酒積食積每服二錢滾水送下此方又治九種胃氣疼痛此病因內傷七情外感六郁客寒犯胃內外相博氣道閉塞鬱於中焦遂成胃氣疼痛之症每服二錢荔枝核三個火上燒為末同茴香子一錢煨湯送下奶母孕婦勿服忌魚牛羊蛋蒜生冷麵食務本卷三白蘿蔔稈葉紅白二種經霜陰乾味甘性溫入脾胃二經治脾胃不和宿食不消胸膈膨脹醒脾氣開胃寬中噎膈打厄硬食膨脹嘔吐酸水赤白痢疾婦人乳結乳腫經閉葉解一切參毒熱邪煮水治天行疫疾昔一劉姓老人年六十餘歲因吃飯著氣得噎食病胸膈膨脹肚腹嘈餓吃飯脹疼嘔吐打厄食積在胸膈不消飲食不下或噎或哽張口吐痰涎用藥不效服此方痊愈白蘿蔔稈五錢鍋內微炒吳神麯三錢白蔻仁三錢去淨殼共為細末每服三錢淡薑湯送下此方並治紅白痢疾加枳殼炒山楂各等份煎服務本卷三紅蘿蔔稈葉味甘平性溫入陽明胃經行血破血乳汁不通奶硬紅腫疼痛婦人經閉血痢裡急後重附單方治紅痢血痢腹疼裡急後重紅蘿蔔稈三錢神麯二錢山楂三錢沙糖二錢水煎服又單方治婦人奶結紅腫疼痛乳汁不通或被壓著或小兒咬著吹著紅蘿蔔稈葉不拘多少搗汁一杯新鮮更好煨熱點水酒或燒酒服亦可務本卷三白牛膝白牛膝一名太極草一名狗辱子一名狗褥子又名狗奪子味苦酸性溫補肝行血破瘀塊涼血熱治月經閉澀腹痛産後發熱虛燒蓐勞室女逆經衄嘔吐血紅崩白帶尿急淋瀝寒濕氣盛筋骨疼痛強筋舒筋攻瘡癰熱毒紅腫痄腮乳蛾男子血淋赤白便濁婦人赤白帶下但墜胎孕婦忌服水酒為使附方治婦人産後七天內傷風或著氣寒邪入於血分頭痛怯寒潮熱口乾胸膈飽脹不思飲食肝氣作痛惡露不止蓐勞等症白牛膝二錢生地一錢丹皮一錢秦歸二錢元參一錢地骨皮一錢銀柴胡一錢黃芩一錢白茯苓一錢水煎點童便服此方又治婦人五種勞熱月經不調燒經作血或伸縮參差白帶漏下小便淋瀝手心發熱午後怕冷夜間發燒煩渴天明時汗乾熱退次早頭暈耳鳴心慌四肢痠軟飲食無味精神短少此虛症已見即以前方加減用之煩渴加麥冬淡竹葉泄瀉加准藥蓮子糯米一勺咳嗽加天冬陳皮百合吼喘加杏仁兜鈴蘇子瓜蔞仁陳皮咳血加茅根扁柏苦馬菜汁又咳帶血絲頭暈耳鳴加荊芥穗心慌不眠加棗仁龍眼肉柏子仁遠志胸膈膨脹加神麯厚朴砂仁不思飲食加蓮子神麯皆點童便服又通經閉消血塊癥瘕行周身經絡強筋舒骨止筋骨疼痛消痰火癱瘓痿軟四肢麻木不仁退婦人肝虛勞熱筋骨發燒補益任督二脈於督脈尤甚凡婦人久不胎育因任督二脈虛損以至不能受胎生育及白帶等症治法以行經後服一兩次即孕附方治肝家虛熱或筋骨發燒午後怯冷夜間作燒四肢痠軟飲食無味虛汗不止白牛膝二錢地骨皮二錢水煎點童便水酒服又方治婦人肝腎虛損任督二脈虧傷不能孕育以及白帶淋瀝等症白牛膝三錢小公雞一隻去腸將藥入雞內亦可入鹽煨爛空心服之每月經行後服一次即有孕若不食雞者單用白牛膝三錢煎湯點水酒服亦可也補注白牛膝強筋骨功勝川牛膝但有孕者忌服其性能墜胎故也附案昔王姓一室女因鬱怒傷肝感冒風寒日久潮熱惡寒漸次月經閉止形體消瘦已成虛勞服此三四次熱退經行遂無恙務本卷二小九牯牛小九牯牛味辛苦性寒走肝經筋骨疼通經絡破血散瘰癧結核攻癰疽紅腫癰疽生於二肩或在脊骨第七八九節上或疒念在肩井穴上加苦連翹服之有膿者出頭無膿者消散治跌打損傷為末敷患處三日後則全好矣叢本卷下鵝腸菜鵝腸菜味甘淡性平補中益氣消痰止頭疼頭目眩暈利小便治肝積肥氣止玉莖疼痛治勞淋赤白便濁婦人赤白帶下昔一婦人得頭暈病每發頭眩暈眼見黑花噁心嘔吐飲食不下後得此方服效鵝腸菜不拘多少豬肚一個煎食二次痊愈又方鵝腸菜不拘多少煮雞蛋食亦效務本卷三馬齒莧馬齒莧味酸咸性微溫入胃益氣清暑熱寬中下氣潤腸消積滯殺蟲療痔瘡紅腫疼痛能催生下胎葉搗汁服能解鉛毒附方一治赤白痢用馬齒莧搗汁和雞白服一治多年惡瘡用馬齒莧搗爛敷兩三遍即瘥一治禿瘡濕癬用馬齒莧燒灰煎膏塗之一治小兒丹毒用馬齒莧搗汁飲渣塗之務本卷三斑莊根斑莊根味苦微澀性微寒攻諸腫毒止咽喉疼痛利小便走經絡治筋骨疼痰火痿軟手足麻木戰搖五淋白濁痔漏瘡癰婦人赤白帶下附單方治筋骨痰火手足麻木戰搖痿軟等症斑莊根一兩川牛膝五錢川加皮五錢防風五錢桂枝五錢木瓜三錢秦歸五錢川芎三錢燒酒三斤泡服務本卷三水紅花子葒草水紅花子味苦平性寒破血治小兒痞塊積聚消一切年深日久堅積療婦人石瘕症務本卷三葒草氣味鹹平無毒主治消渴去熱散氣消積止痛消痞塊最良按葒草即蓼草範本卷八商陸商陸俗名大藥味辛微苦性微寒有小毒主治利小便消水腫攻瘡癰有赤白二種白者可用赤者不入藥然可研末調熱酒擂跌打青黑之處神效再貼膏藥更好補注按商陸行消分利之劑今人以為大藥煮肉吃有大補人虛勞之症非也不宜用務本卷三甜菜甜菜一名牛皮菜味甘性平入陽明經治中膈冷痰胸中食積不宜多食發胃動痰走經絡按甜菜吃之有損無益動肝氣發胃氣疼發背寒面寒發痰火筋骨疼痛肚有疾者吃之發病叢本卷下灰挑銀粉菜灰挑銀粉菜又名灰挑葉灰汞草生有水處緑葉細子葉上有銀霜味辛採取主治一切五痔漏瘡煎水洗之其效如神即治癩亦佳作菜食令人無噎食反胃煎湯食治赤眼腫疼洗眼去風熱務本卷一下菠菜菠菜一名紅根菜味甘微辛性溫入脾肺二經祛風明目開通關竅傷利腸胃解酒通血按菠菜傷腸胃傷風者忌食引風邪入臟腑經絡令人咳嗽多不止叢本卷下土牛膝土牛膝味酸治疔瘡癰疽搗爛敷患處亦能打胎同豬肉煨食之能明目務本卷一下紅牛膝一名相牛膝一名杜牛膝又名雞豚草又名雞豚膝味酸辛性微寒陰也降也入肝脾二經行十二經絡行血破瘀血血塊涼血熱治婦人室女經行月事之期惡寒怯冷發熱腹痛胸脅氣脹錯經妄行吐血衄血咳痰帶血此由陰虛火盛虛火逼血以致妄行治宜滋陰降火附方紅牛膝二錢淮生地一錢土丹皮八分黑元參一錢枳殼一錢苦馬菜二錢延胡三錢水煎點水酒童便服之又方治紅崩初起赤白帶下小便淋瀝或急脹等症紅牛膝三錢清明楊柳二錢土茯苓二錢水煎點水酒服又方治乳蛾痄腮牙根咽喉腫痛湯水難下以及喉閉喉風等症紅牛膝三錢苦馬菜根二錢白頭翁二錢射干一錢赤芍五分甘草五分水煎服又方治五淋赤白便濁紅牛膝一錢木賊根二錢秦艽一錢八仙草一錢甘草五分水煎點水酒服又方治癰疽瘡癤七天後服之消腫潰破紅牛膝不拘多少水煎點水酒服補注紅牛膝應驗方於虛勞發熱症重用紅牛膝退虛熱服之身涼若有涼一二天或七八天後復熱者此皆危症難治附案昔有何姓婦人七月內小産用補氣藥過急瘀血不盡遂成尿血症腰腹疼痛微發熱口乾煩渴舌燥肚腹微痛小便時滴鮮血一二點延醫調治一治以血崩一治以赤白帶下均不見效遂用紅牛膝方三服燒退下乾紫血一小塊後遂痊愈附燒經血論人稟陰陽五行之氣以生有生之後男則血氣調和女則氣有餘而血不足婦人燒經血至令經水不調夫氣以行之血以濡之氣行則血行氣逆則血逆遇月信時有犯忿怒妒嫉則血逆逆久則燒經血蓋鬱怒傷肝肝為血海又主臟血衝任之系寄屬腎肝衝任傷則肝血失守氣盛血逆是涸血海之波使滯不流行為病症見經期前或三日或五日如傷風形症頭痛身困畏寒發熱煩渴時作腰腿胸膈疼痛乳腫腰脅小腹急脹發熱至三四天然後月信方至其色淡黃或紫黑經行甚滯澀或成散經延綿八九日方止一止之後頭暈心慌耳鳴自汗五心煩熱肢體痠軟精神短少飲食無味七八天後方能復原次者月信過期方行或三十五天或四十天以後期數漸遠病勢漸重又有經竟不行午後畏寒形如瘧症夜間煩渴發熱飲食減少癆積咳嗽腹中塊積或左或右上攻心口疼痛手麻足腫漸成危症又有三四十歲經閉不行以成死症蓋女以血為主若血閉住是無生化血不貫通難滋百骸也務本卷二牛膝牛膝一名鐵牛膝緑片有白絲者是味酸微辛性微溫入肝經走經絡止筋骨疼痛強筋舒筋止腰膝痠麻破瘀墜胎散結核攻瘰癧散癰疽疥癩血風瘡牛皮癬膿窠瘡鼻淵腦漏等症附方治筋骨疼痛腰膝酸手足麻牛膝二錢杜仲二錢鹽水炒夏枯草一錢香附一錢童便炙固脂一錢鹽水炒核桃二個用肉搗爛水煎點黃酒服又方治瘰癧結核疥癩血風瘙癢牛膝當歸川芎白芷五味子生地皂角刺以上每味一錢五分用土茯苓二兩煎湯二碗入藥煎服數服而愈務本卷二莧菜白莧菜莧菜家園種有赤白二種味鹹性微溫白者入氣赤者入血白動痰赤破血治大小便不通化蟲去寒熱能通血脈逐瘀血但不可多食恐耗散胃氣忌鱉同食務本卷三莧菜味甘性冷無毒青色分氣除熱利竅赤者治痢産婦食之易産紫莧解毒諸莧利大小腸之熱結凡脾胃虛弱者忌食範本卷八莧菜紅莧菜莧菜同白莧菜野莧菜野莧菜味鹹性微溫白者祛肺中痰積赤者破腸胃中血積赤白同用打肚腹中毛髮之積消蟲積殺寸白蟲下氣消脹洗皮膚瘙癢皮膚遊走之風務本卷三胡麻飯胡麻飯味甘辛性平無毒軟枝細葉枝尖上有一撮細子採取熬膏服食健燥脾胃採子治肺癆吐血採葉治風邪入竅口不能言採根治頭風疼痛務本卷一上赤地榆赤地榆一名萬兩金味苦微澀酸性微寒止面寒背寒肚腹痛日久大腸下血七天後赤白痢症附方治面寒背寒肚腹疼痛赤地榆一錢為末熱燒酒下又方地榆槐角丸治腸胃積熱大腸經便血或腸風便血紅白痢症赤地榆一兩炒槐角三錢炒或花亦可枳殼五錢黃芩三錢荊芥穗二錢全秦歸五錢黃連二錢酒炒共為細末合丸桐子大每服二錢米湯送下務本卷二山皮條山皮條一名矮它它又名矮陀陀味辛辣微苦性微溫有小毒下氣治婦人氣逆肚腹疼痛寬中理氣胸膈肚腹膨脹止面寒梗硬脹疼能退男女勞燒發熱良效附方治婦人氣脹肚腹疼痛並止面寒梗硬脹痛寬中山皮條一兩微焙豬牙皂一錢酒大黃五分共為細末每服二錢熱燒酒服務本卷三苦丁香苦丁香即野丁香花開五色用根味鹹微辛性寒入膀胱經治膀胱偏墜疝氣疼痛利小便若泡水吃可消水腫葉貼臁瘡務本卷二冬瓜冬瓜皮冬瓜味甘淡性平和入脾肺二經潤肺消熱痰止咳嗽利小便治痰吼氣喘薑湯下又解遠方瘴氣又治小兒驚風仁治腸癰務本卷三冬瓜皮味甘淡平性微寒入脾肺二經止渴消痰利小便熬水洗痔良治中風皆效附方治咳嗽冬瓜皮五錢要經過霜者蜂蜜少許水煎服又方冬瓜皮干茄子