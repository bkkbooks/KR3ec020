front:
  text: 滇南本草序據務本節錄參考世胡本校改余幼酷好本草考其性味辨地理之情形察脈絡之往來留心數年合滇中蔬菜草木種種性情並著醫門攬要二卷以傳後世後有學者切不可貪大利而泯救病之思凡行醫者合脈理參悟其應如響慎之慎之滇南楊林止庵蘭茂撰並識滇南本草抄本後序據琴本節錄楊林蘭止庵先生所著滇南本草流傳多本此冊為華君允三琴硯齋傳抄本與坊間印本詳略不一足資參校止庵原籍中州淵源甚遠本草屢稱河南地望謂衛輝產良又紀採藥地曰虹山曰草海曰近華浦太華山秀嵩山想見此老遍嘗百草關心民瘼光緒甲辰七月晉寧後學方樹梅臞仙甫序重刊滇南本草序據務本節錄參考世本校改一考滇南楊林蘭先生者於滇中所產之靈藥百草無不備極精研區類辨性繪為圖形注為書集先生著作甚多殘缺無存其或存者傳寫多訛如滇南草本附醫門攬要一書先前未經刊刻故所存者鮮延及於今二百餘年猶多遺失良可慨也余家有殘篇奈年遠代湮不無廢壞余長兄暄於癸酉年春向里人中尋訪舊存互相校對親為抄補此書乃為之全備但私之於己其獲益有限不如公之於世其為利甚溥也余念及此因重訂之即捐家藏遺本一部刊刻流傳俾得者朝夕採覽識見廣資庶不貽誤於醫藥云時光緒丁亥年仲冬月上浣鄉後學文明管浚重訂題序並書二自來藥書所載甚是不一惟我鄉先達止庵手著滇南草本附醫門攬要一書其間辨藥性之周詳明脈理之精微審見症之確切附湯方之合宜種種悉備有益濟世莫可名言醫家各置一卷藥石之奉誠何愧哉源喜友人管兄所捐藏本刊刻流傳是以為序歲光緒丁亥年仲冬月上浣鄉後學問渠周源清謹識三九州所產之藥晰於漢唐備於宋元已屬無美不臻即六詔所產本草綱目亦載之悉備豈待是書出而滇南之草木始著耶然綱目所載者有限滇南所產者極多使無人以表章之不且湮沒未宣乎明蘭止庵先生研心草木數十年味其甘辛酸苦明其溫燥涼熱圖其柯葉形狀著滇南本草三卷附著醫門攬要二卷於是滇南之一草一木悉有功於人世而流傳不朽矣務本堂主人王級三蒐羅蒐集丁亥仲冬乃得管文明昆季劫灰撥存家藏善本不吝工資重加剞劂正其帝虎烏焉釐其條目篇什越一載而書成為丐數言弁諸簡端予喜其利物濟人之心摯而善其章句字畫之辨明故樂為之序並識其崖略如此云清光緒戊子大雪後五日點蒼郁堂李文煥撰並書滇南本草序據叢本節錄相傳輯雲南藥品者有三家一沐琮曰苴蘭本草一蘭茂一楊慎皆曰滇南本草沐楊惟傳抄本蘭有舊坊刻本其中有劉乾添注數條劉不詳何時何地人恐非蘭氏手定矣至新坊刻蘭本則太糅雜且書中時稱止庵先生決為無識者竄亂止庵之書矣惟道光中皖人孫兆蕙其人習醫工繪得楊慎抄本蘭茂舊坊刻本乃合校而彙編之凡得藥四百一十種分載蘭楊之說亦間附己說自繪為圖而刊之曰一隅本草其書尚可備醫家之用云劍川趙藩撰
