body:
  text: 滇南本草抄本跋據於本節錄滇產藥材久已馳名遐邇神農本草經著錄永昌郡青木香晉常璩華陽國志唐樊綽蠻書分述烏蒙麗水產藥宋政和本草亦屢稱雲南文獻彰彰在人耳目世傳止庵遺書滇南本草傳抄刊刻家喻戶曉尚早於瀕湖綱目此本得之宜良張曲山書前有抄書人題識蓋康熙十四年抄本歷今適二百年雖間有蟲蠹而紙墨猶新抄者又注云一名苴蘭本草非也苴蘭本系沐忠節集未經刊刻此雲南蘭公所集書名滇南本草其所據原本應系刊刻者抄者又云須斟酌考明認真形象或經過試驗方可傳人治病歲在光緒元年乙亥夏懷清於錫金跋
